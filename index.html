            const [showSettings, setShowSettings] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [editingTransaction, setEditingTransaction] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [scannedImage, setScannedImage] = useState(null);
            const [scanResult, setScanResult] = useState(null);
            const [sortBy, setSortBy] = useState('date-desc');
            const [transactionPhotos, setTransactionPhotos] = useState([]);
            const [viewingPhoto, setViewingPhoto] = useState(null);
            const [showCategoryManager, setShowCategoryManager] = useState(false);
            const [newCategoryIcon, setNewCategoryIcon] = useState('📦');
            const [newCategoryName, setNewCategoryName] = useState('');
            const [showIconPicker, setShowIconPicker] = useState(false);

            const [formData, setFormData] = useState({
                transactionType: 'expense',
                amount: '',
                vendor: '',
                category: 'epicerie',
                payer: '',
                isShared: true,
                beneficiary: '',
                userShare: '',
                partnerShare: '',
                date: new Date().toISOString().split('T')[0],
                transferFrom: '',
                transferTo: '',
                note: ''
            });

            useEffect(() => {
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', (snapshot) => {
                    setIsConnected(snapshot.val() === true);
                });

                const savedUserName = localStorage.getItem('userName');
                const savedPartnerName = localStorage.getItem('partnerName');
                const savedRoomCode = localStorage.getItem('roomCode');

                if (savedUserName && savedPartnerName && savedRoomCode) {
                    setUserName(savedUserName);
                    setPartnerName(savedPartnerName);
                    setRoomCode(savedRoomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: savedUserName, beneficiary: savedPartnerName }));
                    loadTransactions(savedRoomCode);
                    loadCategories(savedRoomCode);
                }

                return () => {
                    connectedRef.off();
                };
            }, []);

            useEffect(() => {
                if (formData.isShared && formData.amount) {
                    const amount = parseFloat(formData.amount);
                    if (!isNaN(amount)) {
                        setFormData(prev => ({
                            ...prev,
                            userShare: (amount / 2).toFixed(2),
                            partnerShare: (amount / 2).toFixed(2)
                        }));
                    }
                }
            }, [formData.amount, formData.isShared]);

            const loadTransactions = (code) => {
                const transactionsRef = database.ref(`rooms/${code}/transactions`);
                
                transactionsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const transArray = Object.values(data).sort((a, b) => b.id - a.id);
                        setTransactions(transArray);
                    } else {
                        setTransactions([]);
                    }
                });
            };

            const loadCategories = (code) => {
                const categoriesRef = database.ref(`rooms/${code}/categories`);
                
                categoriesRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setCategories(data);
                    } else {
                        categoriesRef.set(DEFAULT_CATEGORIES);
                        setCategories(DEFAULT_CATEGORIES);
                    }
                });
            };

            const addCategory = () => {
                if (!newCategoryName.trim()) return;

                const categoryId = newCategoryName.toLowerCase().replace(/\s+/g, '_');
                const newCategory = {
                    icon: newCategoryIcon,
                    name: newCategoryName.trim()
                };

                const categoriesRef = database.ref(`rooms/${roomCode}/categories/${categoryId}`);
                categoriesRef.set(newCategory);

                setNewCategoryName('');
                setNewCategoryIcon('📦');
            };

            const removeCategory = (categoryId) => {
                if (Object.keys(DEFAULT_CATEGORIES).includes(categoryId)) {
                    alert('Impossible de supprimer une catégorie par défaut');
                    return;
                }

                if (confirm('Supprimer cette catégorie ?')) {
                    const categoryRef = database.ref(`rooms/${roomCode}/categories/${categoryId}`);
                    categoryRef.remove();
                }
            };

            const handleSetup = (e) => {
                e.preventDefault();
                if (userName && partnerName && roomCode) {
                    localStorage.setItem('userName', userName);
                    localStorage.setItem('partnerName', partnerName);
                    localStorage.setItem('roomCode', roomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: userName, beneficiary: partnerName }));
                    loadTransactions(roomCode);
                    loadCategories(roomCode);
                }
            };

            const addTransaction = (e) => {
                e.preventDefault();
                
                const amount = parseFloat(formData.amount);

                if (formData.transactionType === 'transfer') {
                    const newTransaction = {
                        id: Date.now(),
                        transactionType: 'transfer',
                        amount: amount,
                        transferFrom: formData.transferFrom,
                        transferTo: formData.transferTo,
                        note: formData.note,
                        date: new Date(formData.date).toISOString(),
                        month: new Date(formData.date).getMonth(),
                        year: new Date(formData.date).getFullYear()
                    };

                    const transactionsRef = database.ref(`rooms/${roomCode}/transactions/${newTransaction.id}`);
                    transactionsRef.set(newTransaction);
                } else {
                    let userShare, partnerShare;
                    
                    if (formData.isShared) {
                        userShare = parseFloat(formData.userShare) || amount / 2;
                        partnerShare = parseFloat(formData.partnerShare) || amount / 2;
                    } else {
                        if (formData.payer === userName && formData.beneficiary === partnerName) {
                            userShare = 0;
                            partnerShare = amount;
                        } else if (formData.payer === partnerName && formData.beneficiary === userName) {
                            userShare = amount;
                            partnerShare = 0;
                        } else if (formData.payer === userName && formData.beneficiary === userName) {
                            userShare = amount;
                            partnerShare = 0;
                        } else {
                            userShare = 0;
                            partnerShare = amount;
                        }
                    }

                    const transactionDate = new Date(formData.date);
                    
                    const newTransaction = {
                        id: Date.now(),
                        transactionType: formData.transactionType,
                        amount: amount,
                        vendor: formData.vendor,
                        category: formData.category,
                        payer: formData.payer,
                        beneficiary: formData.isShared ? 'both' : formData.beneficiary,
                        isShared: formData.isShared,
                        userShare: userShare,
                        partnerShare: partnerShare,
                        date: transactionDate.toISOString(),
                        month: transactionDate.getMonth(),
                        year: transactionDate.getFullYear(),
                        photos: transactionPhotos
                    };

                    const transactionsRef = database.ref(`rooms/${roomCode}/transactions/${newTransaction.id}`);
                    transactionsRef.set(newTransaction);
                }

                setFormData({
                    transactionType: 'expense',
                    amount: '',
                    vendor: '',
                    category: 'epicerie',
                    payer: formData.payer,
                    isShared: true,
                    beneficiary: formData.payer === userName ? partnerName : userName,
                    userShare: '',
                    partnerShare: '',
                    date: new Date().toISOString().split('T')[0],
                    transferFrom: '',
                    transferTo: '',
                    note: ''
                });
                setTransactionPhotos([]);
                setScannedImage(null);
                setScanResult(null);
                setShowModal(false);
            };

            const deleteTransaction = (transId) => {
                if (confirm('Supprimer cette transaction ?')) {
                    const transactionRef = database.ref(`rooms/${roomCode}/transactions/${transId}`);
                    transactionRef.remove();
                }
            };

            const editTransaction = (trans) => {
                setEditingTransaction(trans);
                setShowEditModal(true);
            };

            const updateTransaction = (e) => {
                e.preventDefault();
                
                if (!editingTransaction) return;

                const amount = parseFloat(editingTransaction.amount);
                let userShare, partnerShare;

                if (editingTransaction.isShared) {
                    userShare = parseFloat(editingTransaction.userShare) || amount / 2;
                    partnerShare = parseFloat(editingTransaction.partnerShare) || amount / 2;
                } else {
                    if (editingTransaction.payer === userName && editingTransaction.beneficiary === partnerName) {
                        userShare = 0;
                        partnerShare = amount;
                    } else if (editingTransaction.payer === partnerName && editingTransaction.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else if (editingTransaction.payer === userName && editingTransaction.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else {
                        userShare = 0;
                        partnerShare = amount;
                    }
                }

                const transactionDate = new Date(editingTransaction.date);

                const updatedTransaction = {
                    ...editingTransaction,
                    amount: amount,
                    userShare: userShare,
                    partnerShare: partnerShare,
                    month: transactionDate.getMonth(),
                    year: transactionDate.getFullYear()
                };

                const transactionRef = database.ref(`rooms/${roomCode}/transactions/${editingTransaction.id}`);
                transactionRef.set(updatedTransaction);

                setShowEditModal(false);
                setEditingTransaction(null);
            };

            const handleImageCapture = (e, shouldScan = true) => {
                const file = e.target.files[0];
                if (!file) return;

                if (transactionPhotos.length >= 3) {
                    alert('Maximum 3 photos par transaction');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Full = event.target.result;
                    const base64Image = base64Full.split(',')[1];
                    
                    setTransactionPhotos(prev => [...prev, base64Full]);
                    
                    if (shouldScan) {
                        setScannedImage(base64Full);
                        scanReceipt(base64Image);
                    }
                };
                reader.readAsDataURL(file);
            };

            const removePhoto = (index) => {
                setTransactionPhotos(prev => prev.filter((_, i) => i !== index));
            };

            const scanReceipt = async (base64Image) => {
                setIsScanning(true);
                setScanResult(null);

                try {
                    const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            requests: [{
                                image: { content: base64Image },
                                features: [{ type: 'TEXT_DETECTION' }]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.responses && data.responses[0].textAnnotations) {
                        const fullText = data.responses[0].textAnnotations[0].description;
                        parseReceipt(fullText);
                    } else {
                        setScanResult({ error: 'Aucun texte détecté' });
                    }
                } catch (error) {
                    console.error('Erreur scan:', error);
                    setScanResult({ error: 'Erreur lors du scan' });
                } finally {
                    setIsScanning(false);
                }
            };

            const parseReceipt = (text) => {
                const lines = text.split('\n');
                let amount = null;
                let vendor = null;
                let date = null;

                const amountRegex = /(\$?\s*\d+[.,]\d{2})/g;
                const amounts = [];
                
                lines.forEach(line => {
                    const matches = line.match(amountRegex);
                    if (matches) {
                        matches.forEach(match => {
                            const cleanAmount = parseFloat(match.replace(/[$,\s]/g, '').replace(',', '.'));
                            if (cleanAmount > 0 && cleanAmount < 10000) {
                                amounts.push(cleanAmount);
                            }
                        });
                    }
                });

                if (amounts.length > 0) {
                    amount = Math.max(...amounts);
                }

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.length > 2 && trimmed.length < 50 && !trimmed.match(/^\d+$/)) {
                        vendor = trimmed;
                        break;
                    }
                }

                const dateRegex = /(\d{4}[-/]\d{1,2}[-/]\d{1,2}|\d{1,2}[-/]\d{1,2}[-/]\d{4}|\d{1,2}[-/]\d{1,2}[-/]\d{2})/;
                for (let line of lines) {
                    const match = line.match(dateRegex);
                    if (match) {
                        try {
                            const parsedDate = new Date(match[1]);
                            if (!isNaN(parsedDate.getTime())) {
                                date = parsedDate.toISOString().split('T')[0];
                            }
                        } catch (e) {
                            // Ignore
                        }
                        break;
                    }
                }

                setScanResult({ amount, vendor, date, fullText: text });

                if (amount || vendor || date) {
                    setFormData(prev => ({
                        ...prev,
                        amount: amount ? amount.toFixed(2) : prev.amount,
                        vendor: vendor || prev.vendor,
                        date: date || prev.date
                    }));
                }
            };

            const calculateBalance = () => {
                const monthTransactions = transactions.filter(t => {
                    const transDate = new Date(t.date);
                    return transDate.getMonth() === currentMonth.getMonth() &&
                           transDate.getFullYear() === currentMonth.getFullYear();
                });

                let userPaid = 0;
                let partnerPaid = 0;
                let userOwed = 0;
                let partnerOwed = 0;

                monthTransactions.forEach(trans => {
                    const transType = trans.transactionType || 'expense';

                    if (transType === 'transfer') {
                        if (trans.transferFrom === userName) {
                            userPaid += trans.amount;
                        } else if (trans.transferFrom === partnerName) {
                            partnerPaid += trans.amount;
                        }
                    } else if (transType === 'income') {
                        if (trans.userShare !== undefined && trans.partnerShare !== undefined) {
                            if (trans.payer === userName) {
                                userOwed += trans.userShare;
                            } else {
                                partnerOwed += trans.partnerShare;
                            }
                        }
                    } else {
                        if (trans.userShare !== undefined && trans.partnerShare !== undefined) {
                            if (trans.payer === userName) {
                                userPaid += trans.amount;
                                partnerOwed += trans.partnerShare;
                            } else {
                                partnerPaid += trans.amount;
                                userOwed += trans.userShare;
                            }
                        } else {
                            if (trans.type === 'shared') {
                                if (trans.payer === userName) {
                                    userPaid += trans.amount;
                                    partnerOwed += trans.amount / 2;
                                } else {
                                    partnerPaid += trans.amount;
                                    userOwed += trans.amount / 2;
                                }
                            } else if (trans.type === 'personal') {
                                if (trans.payer === userName) {
                                    userPaid += trans.amount;
                                    partnerOwed += trans.amount;
                                } else {
                                    partnerPaid += trans.amount;
                                    userOwed += trans.amount;
                                }
                            }
                        }
                    }
                });

                const balance = partnerOwed - userOwed;

                return { userPaid, partnerPaid, balance, transactions: monthTransactions };
            };

            const changeMonth = (delta) => {
                const newMonth = new Date(currentMonth);
                newMonth.setMonth(newMonth.getMonth() + delta);
                setCurrentMonth(newMonth);
            };

            const formatMonth = (date) => {
                return date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
            };

            const getCategoryLabel = (categoryId) => {
                if (categories[categoryId]) {
                    return `${categories[categoryId].icon} ${categories[categoryId].name}`;
                }
                return categoryId;
            };

            const sortTransactions = (transactionsList) => {
                const sorted = [...transactionsList];
                
                switch(sortBy) {
                    case 'date-desc':
                        return sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
                    case 'date-asc':
                        return sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
                    case 'amount-desc':
                        return sorted.sort((a, b) => b.amount - a.amount);
                    case 'amount-asc':
                        return sorted.sort((a, b) => a.amount - b.amount);
                    case 'vendor':
                        return sorted.sort((a, b) => (a.vendor || '').localeCompare(b.vendor || ''));
                    case 'category':
                        return sorted.sort((a, b) => (a.category || '').localeCompare(b.category || ''));
                    case 'payer':
                        return sorted.sort((a, b) => (a.payer || '').localeCompare(b.payer || ''));
                    default:
                        return sorted;
                }
            };

            const resetApp = () => {
                if (confirm('Voulez-vous vraiment réinitialiser l\'application ?')) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            if (!isSetup) {
                return (
                    <div className="app-container">
                        <div className="header">
                            <h1>BudgetDuo</h1>
                            <p className="tagline">Gestion de budget de couple</p>
                        </div>

                        <div className="setup-screen">
                            <h2>Configuration</h2>
                            <form onSubmit={handleSetup}>
                                <div className="input-group">
                                    <label>Votre nom</label>
                                    <input
                                        type="text"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        placeholder="Ex: Marie"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>Nom de votre partenaire</label>
                                    <input
                                        type="text"
                                        value={partnerName}
                                        onChange={(e) => setPartnerName(e.target.value)}
                                        placeholder="Ex: Jean"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>Code de salle</label>
                                    <input
                                        type="text"
                                        value={roomCode}
                                        onChange={(e) => setRoomCode(e.target.value)}
                                        placeholder="Ex: couple2024"
                                        required
                                    />
                                    <small style={{ color: 'var(--text-secondary)', marginTop: '5px', display: 'block', fontSize: '0.8rem' }}>
                                        Utilisez le même code pour synchroniser
                                    </small>
                                </div>

                                <button type="submit" className="btn">
                                    Commencer
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const { userPaid, partnerPaid, balance, transactions: monthTransactions } = calculateBalance();

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>BudgetDuo</h1>
                        <p className="tagline">{userName} & {partnerName}</p>
                    </div>

                    <div className="balance-card">
                        <div className="balance-label">Bilan du mois</div>
                        <div className="balance-text">
                            {Math.abs(balance) < 0.01 ? 'Tout est égal' :
                             balance > 0 ? `${partnerName} doit ${Math.abs(balance).toFixed(2)}$ à ${userName}` :
                             `${userName} doit ${Math.abs(balance).toFixed(2)}$ à ${partnerName}`}
                        </div>

                        <div className="user-stats">
                            <div className="user-stat">
                                <div className="user-stat-label">{userName} (payé)</div>
                                <div className="user-stat-amount">{userPaid.toFixed(2)} $</div>
                            </div>
                            <div className="user-stat">
                                <div className="user-stat-label">{partnerName} (payé)</div>
                                <div className="user-stat-amount">{partnerPaid.toFixed(2)} $</div>
                            </div>
                        </div>
                    </div>

                    <div className="month-nav">
                        <button onClick={() => changeMonth(-1)}>◀</button>
                        <div className="current-month">{formatMonth(currentMonth)}</div>
                        <button onClick={() => changeMonth(1)}>▶</button>
                    </div>

                    <button className="add-btn" onClick={() => setShowModal(true)}>
                        + Nouvelle transaction
                    </button>

                    <div className="transactions-list">
                        <div className="transactions-header">
                            Historique {monthTransactions.length > 0 && `(${monthTransactions.length})`}
                        </div>

                        {monthTransactions.length > 0 && (
                            <div className="sort-controls">
                                <span className="sort-label">Trier :</span>
                                <select 
                                    className="sort-select"
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                >
                                    <option value="date-desc">Date (récent)</option>
                                    <option value="date-asc">Date (ancien)</option>
                                    <option value="amount-desc">Montant (élevé)</option>
                                    <option value="amount-asc">Montant (bas)</option>
                                    <option value="vendor">Marchand</option>
                                    <option value="category">Catégorie</option>
                                    <option value="payer">Payé par</option>
                                </select>
                            </div>
                        )}

                        {monthTransactions.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">💭</div>
                                <div className="empty-state-text">Aucune transaction ce mois-ci</div>
                            </div>
                        ) : (
                            sortTransactions(monthTransactions).map(trans => {
                                const transType = trans.transactionType || 'expense';
                                return (
                                <div key={trans.id} className={`transaction-item ${transType}`} onDoubleClick={() => deleteTransaction(trans.id)}>
                                    <div className="transaction-header">
                                        <div className="transaction-type">
                                            {transType === 'transfer' ? (
                                                <span className="transaction-type-badge transfer">💸 Transfert</span>
                                            ) : transType === 'income' ? (
                                                <span className="transaction-type-badge income">💚 Revenu</span>
                                            ) : (
                                                <span className="transaction-type-badge expense">
                                                    {trans.isShared ? 'Partagée' : 
                                                     trans.payer === userName && trans.beneficiary === partnerName ? `Pour ${partnerName}` :
                                                     trans.payer === partnerName && trans.beneficiary === userName ? `Pour ${userName}` :
                                                     'Personnelle'}
                                                </span>
                                            )}
                                        </div>
                                        <div className="transaction-actions">
                                            <button 
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    editTransaction(trans);
                                                }}
                                                className="edit-btn"
                                            >
                                                Modifier
                                            </button>
                                            <div className="transaction-amount">{trans.amount.toFixed(2)} $</div>
                                        </div>
                                    </div>
                                    <div className="transaction-details">
                                        {transType === 'transfer' ? (
                                            <>
                                                <div className="transaction-detail">
                                                    <span>{trans.transferFrom} → {trans.transferTo}</span>
                                                </div>
                                                {trans.note && (
                                                    <div className="transaction-detail">
                                                        <span>{trans.note}</span>
                                                    </div>
                                                )}
                                                <div className="transaction-detail">
                                                    <span>{new Date(trans.date).toLocaleDateString('fr-FR')}</span>
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="transaction-detail">
                                                    <span>{transType === 'income' ? 'Reçu:' : 'Payé:'}</span>
                                                    <span>{trans.payer}</span>
                                                </div>
                                                {trans.vendor && (
                                                    <div className="transaction-detail">
                                                        <span>{trans.vendor}</span>
                                                    </div>
                                                )}
                                                <div className="transaction-detail">
                                                    <span>{getCategoryLabel(trans.category)}</span>
                                                </div>
                                                <div className="transaction-detail">
                                                    <span>{new Date(trans.date).toLocaleDateString('fr-FR')}</span>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                    {trans.isShared && transType !== 'transfer' && (
                                        <div style={{ marginTop: '6px', fontSize: '0.75rem', color: transType === 'income' ? '#10B981' : 'var(--accent)' }}>
                                            {userName}: {trans.userShare?.toFixed(2)}$ • {partnerName}: {trans.partnerShare?.toFixed(2)}$
                                        </div>
                                    )}
                                    {trans.photos && trans.photos.length > 0 && (
                                        <div className="photo-gallery">
                                            {trans.photos.map((photo, idx) => (
                                                <img 
                                                    key={idx}
                                                    src={photo}
                                                    alt={`Reçu ${idx + 1}`}
                                                    className="photo-thumbnail"
                                                    onClick={() => setViewingPhoto(photo)}
                                                />
                                            ))}
                                        </div>
                                    )}
                                    <div style={{ 
                                        marginTop: '6px', 
                                        fontSize: '0.7rem', 
                                        color: 'var(--text-secondary)'
                                    }}>
                                        Double-clic pour supprimer
                                    </div>
                                </div>
                                );
                            })
                        )}
                    </div>

                    <button className="settings-btn" onClick={() => setShowSettings(true)}>
                        Paramètres
                    </button>

                    <div className={`sync-status ${isConnected ? 'connected' : ''}`}>
                        {isConnected ? 'Connecté' : 'Déconnecté'}
                    </div>

                    {showModal && (
                        <div className="modal" onClick={() => setShowModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">Nouvelle transaction</h2>
                                
                                <div className="transaction-type-selector">
                                    <div 
                                        className={`transaction-type-option ${formData.transactionType === 'expense' ? 'active' : ''}`}
                                        onClick={() => setFormData({ ...formData, transactionType: 'expense' })}
                                    >
                                        💳 Dépense
                                    </div>
                                    <div 
                                        className={`transaction-type-option income ${formData.transactionType === 'income' ? 'active' : ''}`}
                                        onClick={() => setFormData({ ...formData, transactionType: 'income' })}
                                    >
                                        💚 Revenu
                                    </div>
                                    <div 
                                        className={`transaction-type-option transfer ${formData.transactionType === 'transfer' ? 'active' : ''}`}
                                        onClick={() => setFormData({ ...formData, transactionType: 'transfer' })}
                                    >
                                        💸 Transfert
                                    </div>
                                </div>

                                {formData.transactionType !== 'transfer' && (
                                    <>
                                        <input
                                            type="file"
                                            accept="image/*"
                                            capture="environment"
                                            onChange={handleImageCapture}
                                            style={{ display: 'none' }}
                                            id="camera-input"
                                        />
                                        <label htmlFor="camera-input" className="scan-btn">
                                            Scanner une facture
                                        </label>

                                {isScanning && (
                                    <div className="scanning-status">
                                        Analyse en cours...
                                    </div>
                                )}

                                {scannedImage && (
                                    <img src={scannedImage} alt="Facture" className="image-preview" />
                                )}

                                {scanResult && !scanResult.error && (
                                    <div className="scan-result">
                                        <div className="scan-result-title">Détecté</div>
                                        <div className="scan-result-text">
                                            {scanResult.amount && `${scanResult.amount.toFixed(2)}$`}
                                            {scanResult.vendor && ` • ${scanResult.vendor}`}
                                            {scanResult.date && ` • ${new Date(scanResult.date).toLocaleDateString('fr-FR')}`}
                                        </div>
                                    </div>
                                )}

                                {scanResult && scanResult.error && (
                                    <div className="scan-result" style={{ borderColor: '#ef4444' }}>
                                        <div className="scan-result-title" style={{ color: '#ef4444' }}>Erreur</div>
                                        <div className="scan-result-text">{scanResult.error}</div>
                                    </div>
                                )}

                                {transactionPhotos.length > 0 && (
                                    <div className="photo-preview-container">
                                        {transactionPhotos.map((photo, idx) => (
                                            <div key={idx} className="photo-preview-item">
                                                <img src={photo} alt={`Photo ${idx + 1}`} className="photo-preview-img" />
                                                <button 
                                                    type="button"
                                                    className="photo-preview-remove"
                                                    onClick={() => removePhoto(idx)}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {transactionPhotos.length < 3 && (
                                    <>
                                        <input
                                            type="file"
                                            accept="image/*"
                                            capture="environment"
                                            onChange={(e) => handleImageCapture(e, false)}
                                            style={{ display: 'none' }}
                                            id="add-photo-input"
                                        />
                                        <label htmlFor="add-photo-input" className="add-photo-btn">
                                            Ajouter photo ({transactionPhotos.length}/3)
                                        </label>
                                    </>
                                )}

                                <form onSubmit={addTransaction}>
                                    <div className="input-group">
                                        <label>Date</label>
                                        <input
                                            type="date"
                                            value={formData.date}
                                            onChange={(e) => setFormData({ ...formData, date: e.target.value })}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Montant</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={formData.amount}
                                            onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                            placeholder="100.00"
                                            required
                                        />
                                    </div>

                                    {formData.transactionType === 'transfer' ? (
                                        <>
                                            <div className="input-group">
                                                <label>De</label>
                                                <select
                                                    value={formData.transferFrom}
                                                    onChange={(e) => setFormData({ 
                                                        ...formData, 
                                                        transferFrom: e.target.value,
                                                        transferTo: e.target.value === userName ? partnerName : userName
                                                    })}
                                                    required
                                                >
                                                    <option value="">Sélectionner...</option>
                                                    <option value={userName}>{userName}</option>
                                                    <option value={partnerName}>{partnerName}</option>
                                                </select>
                                            </div>

                                            <div className="input-group">
                                                <label>Vers</label>
                                                <input
                                                    type="text"
                                                    value={formData.transferFrom === userName ? partnerName : userName}
                                                    readOnly
                                                    style={{ background: 'var(--bg-secondary)', cursor: 'not-allowed' }}
                                                />
                                            </div>

                                            <div className="input-group">
                                                <label>Note</label>
                                                <input
                                                    type="text"
                                                    value={formData.note}
                                                    onChange={(e) => setFormData({ ...formData, note: e.target.value })}
                                                    placeholder="Paiement janvier, Remboursement..."
                                                />
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="input-group">
                                                <label>{formData.transactionType === 'income' ? 'Reçu par' : 'Payé par'}</label>
                                                <select
                                                    value={formData.payer}
                                                    onChange={(e) => setFormData({ ...formData, payer: e.target.value })}
                                                    required
                                                >
                                                    <option value={userName}>{userName}</option>
                                                    <option value={partnerName}>{partnerName}</option>
                                                </select>
                                            </div>

                                            <div className="checkbox-group">
                                                <input
                                                    type="checkbox"
                                                    id="isShared"
                                                    checked={formData.isShared}
                                                    onChange={(e) => setFormData({ ...formData, isShared: e.target.checked })}
                                                />
                                                <label htmlFor="isShared">
                                                    {formData.transactionType === 'income' ? 'Partager ce revenu' : 'Partager cette dépense'}
                                                </label>
                                            </div>

                                    {formData.isShared ? (
                                        <div className="share-inputs">
                                            <div className="share-input-group">
                                                <label>Part {userName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={formData.userShare}
                                                    onChange={(e) => {
                                                        const userVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(formData.amount) || 0;
                                                        setFormData({ 
                                                            ...formData, 
                                                            userShare: e.target.value,
                                                            partnerShare: (total - userVal).toFixed(2)
                                                        });
                                                    }}
                                                    placeholder="50.00"
                                                />
                                            </div>
                                            <div className="share-input-group">
                                                <label>Part {partnerName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={formData.partnerShare}
                                                    onChange={(e) => {
                                                        const partnerVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(formData.amount) || 0;
                                                        setFormData({ 
                                                            ...formData, 
                                                            partnerShare: e.target.value,
                                                            userShare: (total - partnerVal).toFixed(2)
                                                        });
                                                    }}
                                                    placeholder="50.00"
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="input-group">
                                            <label>Pour qui ?</label>
                                            <select
                                                value={formData.beneficiary}
                                                onChange={(e) => setFormData({ ...formData, beneficiary: e.target.value })}
                                                required
                                            >
                                                <option value={userName}>{userName}</option>
                                                <option value={partnerName}>{partnerName}</option>
                                            </select>
                                        </div>
                                    )}

                                    {formData.transactionType !== 'transfer' && (
                                        <>
                                            <div className="input-group">
                                                <label>{formData.transactionType === 'income' ? 'Source' : 'Marchand'}</label>
                                        <input
                                            type="text"
                                            value={formData.vendor}
                                            onChange={(e) => setFormData({ ...formData, vendor: e.target.value })}
                                            placeholder="IGA, Tim Hortons..."
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Catégorie</label>
                                        <select
                                            value={formData.category}
                                            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        >
                                            {Object.entries(categories).map(([id, cat]) => (
                                                <option key={id} value={id}>{cat.icon} {cat.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="category-manager">
                                        <div 
                                            className="category-manager-header"
                                            onClick={() => setShowCategoryManager(!showCategoryManager)}
                                        >
                                            <div className="category-manager-title">Gérer les catégories</div>
                                            <div className="category-manager-toggle">
                                                {showCategoryManager ? '▼' : '▶'}
                                            </div>
                                        </div>

                                        {showCategoryManager && (
                                            <>
                                                <div className="category-list">
                                                    {Object.entries(categories).map(([id, cat]) => (
                                                        <div key={id} className="category-item">
                                                            <span>{cat.icon} {cat.name}</span>
                                                            {!Object.keys(DEFAULT_CATEGORIES).includes(id) && (
                                                                <button
                                                                    type="button"
                                                                    className="category-item-remove"
                                                                    onClick={() => removeCategory(id)}
                                                                >
                                                                    ×
                                                                </button>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="add-category-form">
                                                    <div className="icon-picker-container">
                                                        <div 
                                                            className="icon-picker"
                                                            onClick={() => setShowIconPicker(!showIconPicker)}
                                                        >
                                                            {newCategoryIcon}
                                                        </div>
                                                        {showIconPicker && (
                                                            <div className="icon-picker-dropdown">
                                                                {AVAILABLE_ICONS.map((icon, idx) => (
                                                                    <div
                                                                        key={idx}
                                                                        className="icon-option"
                                                                        onClick={() => {
                                                                            setNewCategoryIcon(icon);
                                                                            setShowIconPicker(false);
                                                                        }}
                                                                    >
                                                                        {icon}
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <input
                                                        type="text"
                                                        className="category-name-input"
                                                        value={newCategoryName}
                                                        onChange={(e) => setNewCategoryName(e.target.value)}
                                                        placeholder="Nom..."
                                                    />
                                                    <button
                                                        type="button"
                                                        className="add-category-btn"
                                                        onClick={addCategory}
                                                    >
                                                        + Ajouter
                                                    </button>
                                                </div>
                                            </>
                                        )}
                                            </div>
                                        </>
                                    )}

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            Ajouter
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="modal" onClick={() => setShowSettings(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">Paramètres</h2>
                                <div style={{ marginBottom: '15px' }}>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '8px', fontSize: '0.9rem' }}>
                                        <strong>Noms:</strong> {userName} & {partnerName}
                                    </p>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '8px', fontSize: '0.9rem' }}>
                                        <strong>Code:</strong> {roomCode}
                                    </p>
                                    <p style={{ color: isConnected ? '#10B981' : '#fbbf24', marginTop: '12px', fontWeight: 'bold', fontSize: '0.9rem' }}>
                                        {isConnected ? 'Connecté' : 'Connexion perdue'}
                                    </p>
                                </div>
                                <button className="btn" style={{ background: '#EF4444' }} onClick={resetApp}>
                                    Réinitialiser
                                </button>
                                <button className="btn btn-secondary" style={{ marginTop: '10px' }} onClick={() => setShowSettings(false)}>
                                    Fermer
                                </button>
                            </div>
                        </div>
                    )}

                    {showEditModal && editingTransaction && (
                        <div className="modal" onClick={() => setShowEditModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">Modifier</h2>
                                <form onSubmit={updateTransaction}>
                                    <div className="input-group">
                                        <label>Date</label>
                                        <input
                                            type="date"
                                            value={editingTransaction.date ? editingTransaction.date.split('T')[0] : ''}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, date: new Date(e.target.value).toISOString() })}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Montant</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={editingTransaction.amount}
                                            onChange={(e) => {
                                                const newAmount = parseFloat(e.target.value);
                                                if (editingTransaction.isShared) {
                                                    setEditingTransaction({
                                                        ...editingTransaction,
                                                        amount: e.target.value,
                                                        userShare: (newAmount / 2).toFixed(2),
                                                        partnerShare: (newAmount / 2).toFixed(2)
                                                    });
                                                } else {
                                                    setEditingTransaction({ ...editingTransaction, amount: e.target.value });
                                                }
                                            }}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Payé par</label>
                                        <select
                                            value={editingTransaction.payer}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, payer: e.target.value })}
                                            required
                                        >
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="checkbox-group">
                                        <input
                                            type="checkbox"
                                            id="editIsShared"
                                            checked={editingTransaction.isShared}
                                            onChange={(e) => {
                                                const amount = parseFloat(editingTransaction.amount);
                                                setEditingTransaction({ 
                                                    ...editingTransaction, 
                                                    isShared: e.target.checked,
                                                    userShare: e.target.checked ? (amount / 2).toFixed(2) : editingTransaction.userShare,
                                                    partnerShare: e.target.checked ? (amount / 2).toFixed(2) : editingTransaction.partnerShare
                                                });
                                            }}
                                        />
                                        <label htmlFor="editIsShared">Partager</label>
                                    </div>

                                    {editingTransaction.isShared ? (
                                        <div className="share-inputs">
                                            <div className="share-input-group">
                                                <label>Part {userName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editingTransaction.userShare}
                                                    onChange={(e) => {
                                                        const userVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(editingTransaction.amount) || 0;
                                                        setEditingTransaction({ 
                                                            ...editingTransaction, 
                                                            userShare: e.target.value,
                                                            partnerShare: (total - userVal).toFixed(2)
                                                        });
                                                    }}
                                                />
                                            </div>
                                            <div className="share-input-group">
                                                <label>Part {partnerName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editingTransaction.partnerShare}
                                                    onChange={(e) => {
                                                        const partnerVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(editingTransaction.amount) || 0;
                                                        setEditingTransaction({ 
                                                            ...editingTransaction, 
                                                            partnerShare: e.target.value,
                                                            userShare: (total - partnerVal).toFixed(2)
                                                        });
                                                    }}
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="input-group">
                                            <label>Pour qui ?</label>
                                            <select
                                                value={editingTransaction.beneficiary}
                                                onChange={(e) => setEditingTransaction({ ...editingTransaction, beneficiary: e.target.value })}
                                                required
                                            >
                                                <option value={userName}>{userName}</option>
                                                <option value={partnerName}>{partnerName}</option>
                                            </select>
                                        </div>
                                    )}

                                    {formData.transactionType !== 'transfer' && (
                                        <>
                                            <div className="input-group">
                                                <label>{formData.transactionType === 'income' ? 'Source' : 'Marchand'}</label>
                                        <input
                                            type="text"
                                            value={editingTransaction.vendor}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, vendor: e.target.value })}
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Catégorie</label>
                                        <select
                                            value={editingTransaction.category}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, category: e.target.value })}
                                        >
                                            {Object.entries(categories).map(([id, cat]) => (
                                                <option key={id} value={id}>{cat.icon} {cat.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => {
                                            setShowEditModal(false);
                                            setEditingTransaction(null);
                                        }}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            Enregistrer
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {viewingPhoto && (
                        <div className="photo-modal" onClick={() => setViewingPhoto(null)}>
                            <div className="photo-modal-content" onClick={(e) => e.stopPropagation()}>
                                <button className="photo-modal-close" onClick={() => setViewingPhoto(null)}>
                                    ✕ Fermer
                                </button>
                                <img src={viewingPhoto} alt="Reçu" className="photo-modal-image" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<BudgetDuo />, document.getElementById('root'));
    </script>
</body>
</html>
