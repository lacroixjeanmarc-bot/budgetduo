<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetDuo 💑</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151936;
            --bg-card: #1a1f3a;
            --accent-pink: #ff6b9d;
            --accent-blue: #4fc3f7;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Karla', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1042 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent),
                radial-gradient(1px 1px at 33% 80%, white, transparent);
            background-size: 200% 200%;
            background-position: 0% 0%;
            animation: stars 60s ease-in-out infinite;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes stars {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            padding: 20px 15px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(79, 195, 247, 0.1) 100%);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 107, 157, 0.2);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '💑';
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 80px;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-style: italic;
        }

        .setup-screen {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setup-screen h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent-pink);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Karla', sans-serif;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--accent-pink);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        .share-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(79, 195, 247, 0.3);
        }

        .share-input-group {
            display: flex;
            flex-direction: column;
        }

        .share-input-group label {
            font-size: 0.85rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
            text-transform: none;
        }

        .share-input-group input {
            padding: 12px;
            font-size: 0.95rem;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .balance-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .balance-label {
            position: relative;
            z-index: 1;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .balance-amount {
            position: relative;
            z-index: 1;
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .balance-text {
            position: relative;
            z-index: 1;
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .user-stats {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .user-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .user-stat-amount {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            background: var(--bg-card);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .month-nav button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .month-nav button:hover {
            background: var(--accent-pink);
            transform: scale(1.1);
        }

        .current-month {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--accent-pink);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 15px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .transactions-list {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .transactions-header {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transaction-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-pink);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .transaction-type {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .transaction-amount {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            color: var(--accent-gold);
        }

        .transaction-details {
            color: var(--text-secondary);
            font-size: 0.8rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .transaction-detail {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 107, 157, 0.3);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--accent-pink);
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2rem;
            font-style: italic;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 15px;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .scan-btn {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            margin-bottom: 15px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .scan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.5);
        }

        .image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .scanning-status {
            text-align: center;
            padding: 20px;
            color: var(--accent-blue);
            font-style: italic;
        }

        .scan-result {
            background: rgba(16, 185, 129, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .scan-result-title {
            color: #10b981;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .scan-result-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .sync-status.connected {
            color: #4ade80;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .balance-amount {
                font-size: 2rem;
            }

            .user-stats {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .modal-buttons {
                flex-direction: column;
            }
            
            .share-inputs {
                grid-template-columns: 1fr;
            }

            .transaction-item {
                padding: 10px;
            }

            .transaction-details {
                font-size: 0.75rem;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // REMPLACE avec ta configuration Firebase
        const firebaseConfig = {
  apiKey: "AIzaSyBP4VP0zfXMDGhWmparJAnue-2mIpgDWfE",
  authDomain: "budgetduo-96f22.firebaseapp.com",
  databaseURL: "https://budgetduo-96f22-default-rtdb.firebaseio.com",
  projectId: "budgetduo-96f22",
  storageBucket: "budgetduo-96f22.firebasestorage.app",
  messagingSenderId: "44840005819",
  appId: "1:44840005819:web:5344367cda9a500a4a799e"
};

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function BudgetDuo() {
            const [isSetup, setIsSetup] = useState(false);
            const [userName, setUserName] = useState('');
            const [partnerName, setPartnerName] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [editingTransaction, setEditingTransaction] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [scannedImage, setScannedImage] = useState(null);
            const [scanResult, setScanResult] = useState(null);

            const VISION_API_KEY = 'AIzaSyDIdcbS0yDHtAgToOMln30DBR75OOuloVM';

            const [formData, setFormData] = useState({
                amount: '',
                vendor: '',
                category: 'epicerie',
                payer: '',
                isShared: true,
                beneficiary: '',
                userShare: '',
                partnerShare: '',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', (snapshot) => {
                    setIsConnected(snapshot.val() === true);
                });

                const savedUserName = localStorage.getItem('userName');
                const savedPartnerName = localStorage.getItem('partnerName');
                const savedRoomCode = localStorage.getItem('roomCode');

                if (savedUserName && savedPartnerName && savedRoomCode) {
                    setUserName(savedUserName);
                    setPartnerName(savedPartnerName);
                    setRoomCode(savedRoomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: savedUserName, beneficiary: savedPartnerName }));
                    loadTransactions(savedRoomCode);
                }

                return () => {
                    connectedRef.off();
                };
            }, []);

            useEffect(() => {
                if (formData.isShared && formData.amount) {
                    const amount = parseFloat(formData.amount);
                    if (!isNaN(amount)) {
                        setFormData(prev => ({
                            ...prev,
                            userShare: (amount / 2).toFixed(2),
                            partnerShare: (amount / 2).toFixed(2)
                        }));
                    }
                }
            }, [formData.amount, formData.isShared]);

            const loadTransactions = (code) => {
                const transactionsRef = database.ref(`rooms/${code}/transactions`);
                
                transactionsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const transArray = Object.values(data).sort((a, b) => b.id - a.id);
                        setTransactions(transArray);
                    } else {
                        setTransactions([]);
                    }
                });
            };

            const handleSetup = (e) => {
                e.preventDefault();
                if (userName && partnerName && roomCode) {
                    localStorage.setItem('userName', userName);
                    localStorage.setItem('partnerName', partnerName);
                    localStorage.setItem('roomCode', roomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: userName, beneficiary: partnerName }));
                    loadTransactions(roomCode);
                }
            };

            const addTransaction = (e) => {
                e.preventDefault();
                
                const amount = parseFloat(formData.amount);
                let userShare, partnerShare;
                
                if (formData.isShared) {
                    userShare = parseFloat(formData.userShare) || amount / 2;
                    partnerShare = parseFloat(formData.partnerShare) || amount / 2;
                } else {
                    if (formData.payer === userName && formData.beneficiary === partnerName) {
                        userShare = 0;
                        partnerShare = amount;
                    } else if (formData.payer === partnerName && formData.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else if (formData.payer === userName && formData.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else {
                        userShare = 0;
                        partnerShare = amount;
                    }
                }

                const transactionDate = new Date(formData.date);
                
                const newTransaction = {
                    id: Date.now(),
                    amount: amount,
                    vendor: formData.vendor,
                    category: formData.category,
                    payer: formData.payer,
                    beneficiary: formData.isShared ? 'both' : formData.beneficiary,
                    isShared: formData.isShared,
                    userShare: userShare,
                    partnerShare: partnerShare,
                    date: transactionDate.toISOString(),
                    month: transactionDate.getMonth(),
                    year: transactionDate.getFullYear()
                };

                const transactionsRef = database.ref(`rooms/${roomCode}/transactions/${newTransaction.id}`);
                transactionsRef.set(newTransaction);

                setFormData({
                    amount: '',
                    vendor: '',
                    category: 'epicerie',
                    payer: formData.payer,
                    isShared: true,
                    beneficiary: formData.payer === userName ? partnerName : userName,
                    userShare: '',
                    partnerShare: '',
                    date: new Date().toISOString().split('T')[0]
                });
                setShowModal(false);
            };

            const deleteTransaction = (transId) => {
                if (confirm('Supprimer cette transaction ?')) {
                    const transactionRef = database.ref(`rooms/${roomCode}/transactions/${transId}`);
                    transactionRef.remove();
                }
            };

            const editTransaction = (trans) => {
                setEditingTransaction(trans);
                setShowEditModal(true);
            };

            const updateTransaction = (e) => {
                e.preventDefault();
                
                if (!editingTransaction) return;

                const amount = parseFloat(editingTransaction.amount);
                let userShare, partnerShare;

                if (editingTransaction.isShared) {
                    userShare = parseFloat(editingTransaction.userShare) || amount / 2;
                    partnerShare = parseFloat(editingTransaction.partnerShare) || amount / 2;
                } else {
                    if (editingTransaction.payer === userName && editingTransaction.beneficiary === partnerName) {
                        userShare = 0;
                        partnerShare = amount;
                    } else if (editingTransaction.payer === partnerName && editingTransaction.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else if (editingTransaction.payer === userName && editingTransaction.beneficiary === userName) {
                        userShare = amount;
                        partnerShare = 0;
                    } else {
                        userShare = 0;
                        partnerShare = amount;
                    }
                }

                const transactionDate = new Date(editingTransaction.date);

                const updatedTransaction = {
                    ...editingTransaction,
                    amount: amount,
                    userShare: userShare,
                    partnerShare: partnerShare,
                    month: transactionDate.getMonth(),
                    year: transactionDate.getFullYear()
                };

                const transactionRef = database.ref(`rooms/${roomCode}/transactions/${editingTransaction.id}`);
                transactionRef.set(updatedTransaction);

                setShowEditModal(false);
                setEditingTransaction(null);
            };

            const handleImageCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Image = event.target.result.split(',')[1];
                    setScannedImage(event.target.result);
                    scanReceipt(base64Image);
                };
                reader.readAsDataURL(file);
            };

            const scanReceipt = async (base64Image) => {
                setIsScanning(true);
                setScanResult(null);

                try {
                    const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            requests: [{
                                image: { content: base64Image },
                                features: [{ type: 'TEXT_DETECTION' }]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.responses && data.responses[0].textAnnotations) {
                        const fullText = data.responses[0].textAnnotations[0].description;
                        parseReceipt(fullText);
                    } else {
                        setScanResult({ error: 'Aucun texte détecté sur l\'image' });
                    }
                } catch (error) {
                    console.error('Erreur scan:', error);
                    setScanResult({ error: 'Erreur lors du scan de la facture' });
                } finally {
                    setIsScanning(false);
                }
            };

            const parseReceipt = (text) => {
                const lines = text.split('\n');
                let amount = null;
                let vendor = null;
                let date = null;

                const amountRegex = /(\$?\s*\d+[.,]\d{2})/g;
                const amounts = [];
                
                lines.forEach(line => {
                    const matches = line.match(amountRegex);
                    if (matches) {
                        matches.forEach(match => {
                            const cleanAmount = parseFloat(match.replace(/[$,\s]/g, '').replace(',', '.'));
                            if (cleanAmount > 0 && cleanAmount < 10000) {
                                amounts.push(cleanAmount);
                            }
                        });
                    }
                });

                if (amounts.length > 0) {
                    amount = Math.max(...amounts);
                }

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.length > 2 && trimmed.length < 50 && !trimmed.match(/^\d+$/)) {
                        vendor = trimmed;
                        break;
                    }
                }

                const dateRegex = /(\d{4}[-/]\d{1,2}[-/]\d{1,2}|\d{1,2}[-/]\d{1,2}[-/]\d{4}|\d{1,2}[-/]\d{1,2}[-/]\d{2})/;
                for (let line of lines) {
                    const match = line.match(dateRegex);
                    if (match) {
                        try {
                            const parsedDate = new Date(match[1]);
                            if (!isNaN(parsedDate.getTime())) {
                                date = parsedDate.toISOString().split('T')[0];
                            }
                        } catch (e) {
                            // Ignore
                        }
                        break;
                    }
                }

                setScanResult({ amount, vendor, date, fullText: text });

                if (amount || vendor || date) {
                    setFormData(prev => ({
                        ...prev,
                        amount: amount ? amount.toFixed(2) : prev.amount,
                        vendor: vendor || prev.vendor,
                        date: date || prev.date
                    }));
                }
            };

            const calculateBalance = () => {
                const monthTransactions = transactions.filter(t => {
                    const transDate = new Date(t.date);
                    return transDate.getMonth() === currentMonth.getMonth() &&
                           transDate.getFullYear() === currentMonth.getFullYear();
                });

                let userTotal = 0;
                let partnerTotal = 0;

                monthTransactions.forEach(trans => {
                    if (trans.userShare !== undefined && trans.partnerShare !== undefined) {
                        if (trans.payer === userName) {
                            partnerTotal += trans.partnerShare;
                        } else {
                            userTotal += trans.userShare;
                        }
                    } else {
                        if (trans.type === 'shared') {
                            if (trans.payer === userName) {
                                partnerTotal += trans.amount / 2;
                            } else {
                                userTotal += trans.amount / 2;
                            }
                        } else if (trans.type === 'personal') {
                            if (trans.payer === userName) {
                                partnerTotal += trans.amount;
                            } else {
                                userTotal += trans.amount;
                            }
                        } else if (trans.type === 'refund') {
                            userTotal -= trans.amount / 2;
                            partnerTotal -= trans.amount / 2;
                        }
                    }
                });

                const balance = partnerTotal - userTotal;

                return { userTotal, partnerTotal, balance, transactions: monthTransactions };
            };

            const changeMonth = (delta) => {
                const newMonth = new Date(currentMonth);
                newMonth.setMonth(newMonth.getMonth() + delta);
                setCurrentMonth(newMonth);
            };

            const formatMonth = (date) => {
                return date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
            };

            const getCategoryLabel = (category) => {
                const labels = {
                    epicerie: '🛒 Épicerie',
                    restaurant: '🍽️ Restaurant',
                    transport: '🚗 Transport',
                    loisirs: '🎮 Loisirs',
                    pharmacie: '💊 Pharmacie',
                    entretien: '🔧 Entretien',
                    electricite: '⚡ Électricité',
                    hypotheque: '🏠 Hypothèque',
                    autre: '📦 Autre'
                };
                return labels[category] || category;
            };

            const resetApp = () => {
                if (confirm('Voulez-vous vraiment réinitialiser l\'application ?')) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            if (!isSetup) {
                return (
                    <div className="app-container">
                        <div className="header">
                            <h1>BudgetDuo</h1>
                            <p className="tagline">Gérez vos finances à deux, en toute simplicité</p>
                        </div>

                        <div className="setup-screen">
                            <h2>✨ Configuration initiale</h2>
                            <form onSubmit={handleSetup}>
                                <div className="input-group">
                                    <label>👤 Votre nom</label>
                                    <input
                                        type="text"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        placeholder="Ex: Marie"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>💑 Nom de votre partenaire</label>
                                    <input
                                        type="text"
                                        value={partnerName}
                                        onChange={(e) => setPartnerName(e.target.value)}
                                        placeholder="Ex: Jean"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>🔐 Code de salle</label>
                                    <input
                                        type="text"
                                        value={roomCode}
                                        onChange={(e) => setRoomCode(e.target.value)}
                                        placeholder="Ex: couple2024"
                                        required
                                    />
                                    <small style={{ color: 'var(--text-secondary)', marginTop: '8px', display: 'block' }}>
                                        💡 Utilisez le même code pour synchroniser vos données
                                    </small>
                                </div>

                                <button type="submit" className="btn">
                                    🚀 Commencer
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const { userTotal, partnerTotal, balance, transactions: monthTransactions } = calculateBalance();

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>BudgetDuo</h1>
                        <p className="tagline">{userName} & {partnerName}</p>
                    </div>

                    <div className="balance-card">
                        <div className="balance-label">Bilan du mois</div>
                        <div className="balance-amount">{Math.abs(balance).toFixed(2)} $</div>
                        <div className="balance-text">
                            {Math.abs(balance) < 0.01 ? '✨ Tout est égal !' :
                             balance > 0 ? `💰 ${partnerName} doit ${Math.abs(balance).toFixed(2)}$ à ${userName}` :
                             `💸 ${userName} doit ${Math.abs(balance).toFixed(2)}$ à ${partnerName}`}
                        </div>

                        <div className="user-stats">
                            <div className="user-stat">
                                <div className="user-stat-label">{userName}</div>
                                <div className="user-stat-amount">{Math.abs(userTotal).toFixed(2)} $</div>
                            </div>
                            <div className="user-stat">
                                <div className="user-stat-label">{partnerName}</div>
                                <div className="user-stat-amount">{Math.abs(partnerTotal).toFixed(2)} $</div>
                            </div>
                        </div>
                    </div>

                    <div className="month-nav">
                        <button onClick={() => changeMonth(-1)}>◀</button>
                        <div className="current-month">{formatMonth(currentMonth)}</div>
                        <button onClick={() => changeMonth(1)}>▶</button>
                    </div>

                    <button className="add-btn" onClick={() => setShowModal(true)}>
                        ➕ Nouvelle transaction
                    </button>

                    <div className="transactions-list">
                        <div className="transactions-header">
                            📋 Historique {monthTransactions.length > 0 && `(${monthTransactions.length})`}
                        </div>

                        {monthTransactions.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">💭</div>
                                <div className="empty-state-text">Aucune transaction ce mois-ci</div>
                            </div>
                        ) : (
                            monthTransactions.map(trans => (
                                <div key={trans.id} className="transaction-item" onDoubleClick={() => deleteTransaction(trans.id)}>
                                    <div className="transaction-header">
                                        <div className="transaction-type">
                                            {trans.isShared ? '🤝 Partagée' : 
                                             trans.payer === userName && trans.beneficiary === partnerName ? `💸 Pour ${partnerName}` :
                                             trans.payer === partnerName && trans.beneficiary === userName ? `💸 Pour ${userName}` :
                                             '👤 Personnelle'}
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                            <button 
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    editTransaction(trans);
                                                }}
                                                style={{
                                                    background: 'rgba(255, 255, 255, 0.1)',
                                                    border: 'none',
                                                    borderRadius: '6px',
                                                    padding: '6px 12px',
                                                    color: 'var(--accent-blue)',
                                                    cursor: 'pointer',
                                                    fontSize: '0.9rem',
                                                    transition: 'all 0.2s ease'
                                                }}
                                                onMouseOver={(e) => e.target.style.background = 'rgba(79, 195, 247, 0.2)'}
                                                onMouseOut={(e) => e.target.style.background = 'rgba(255, 255, 255, 0.1)'}
                                            >
                                                ✏️ Modifier
                                            </button>
                                            <div className="transaction-amount">{trans.amount.toFixed(2)} $</div>
                                        </div>
                                    </div>
                                    <div className="transaction-details">
                                        <div className="transaction-detail">
                                            <span>👤 Payé par</span>
                                            <span>{trans.payer}</span>
                                        </div>
                                        {trans.vendor && (
                                            <div className="transaction-detail">
                                                <span>🏪</span>
                                                <span>{trans.vendor}</span>
                                            </div>
                                        )}
                                        <div className="transaction-detail">
                                            <span>{getCategoryLabel(trans.category)}</span>
                                        </div>
                                        <div className="transaction-detail">
                                            <span>📅</span>
                                            <span>{new Date(trans.date).toLocaleDateString('fr-FR')}</span>
                                        </div>
                                    </div>
                                    {trans.isShared && (
                                        <div style={{ marginTop: '10px', fontSize: '0.85rem', color: 'var(--accent-blue)' }}>
                                            Part {userName}: {trans.userShare?.toFixed(2)}$ • Part {partnerName}: {trans.partnerShare?.toFixed(2)}$
                                        </div>
                                    )}
                                    <div style={{ 
                                        marginTop: '10px', 
                                        fontSize: '0.75rem', 
                                        color: 'var(--text-secondary)', 
                                        fontStyle: 'italic' 
                                    }}>
                                        💡 Double-clic pour supprimer
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    <button className="settings-btn" onClick={() => setShowSettings(true)}>
                        ⚙️ Paramètres
                    </button>

                    <div className={`sync-status ${isConnected ? 'connected' : ''}`}>
                        {isConnected ? '🔥 Connecté' : '⚠️ Déconnecté'}
                    </div>

                    {showModal && (
                        <div className="modal" onClick={() => setShowModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">➕ Nouvelle transaction</h2>
                                
                                <input
                                    type="file"
                                    accept="image/*"
                                    capture="environment"
                                    onChange={handleImageCapture}
                                    style={{ display: 'none' }}
                                    id="camera-input"
                                />
                                <label htmlFor="camera-input" className="scan-btn">
                                    📸 Scanner une facture
                                </label>

                                {isScanning && (
                                    <div className="scanning-status">
                                        🔍 Analyse de la facture en cours...
                                    </div>
                                )}

                                {scannedImage && (
                                    <img src={scannedImage} alt="Facture scannée" className="image-preview" />
                                )}

                                {scanResult && !scanResult.error && (
                                    <div className="scan-result">
                                        <div className="scan-result-title">✅ Détection réussie !</div>
                                        <div className="scan-result-text">
                                            {scanResult.amount && `💰 Montant: ${scanResult.amount.toFixed(2)}$`}
                                            {scanResult.vendor && ` • 🏪 ${scanResult.vendor}`}
                                            {scanResult.date && ` • 📅 ${new Date(scanResult.date).toLocaleDateString('fr-FR')}`}
                                        </div>
                                    </div>
                                )}

                                {scanResult && scanResult.error && (
                                    <div className="scan-result" style={{ borderColor: '#ef4444', background: 'rgba(239, 68, 68, 0.1)' }}>
                                        <div className="scan-result-title" style={{ color: '#ef4444' }}>❌ Erreur</div>
                                        <div className="scan-result-text">{scanResult.error}</div>
                                    </div>
                                )}

                                <form onSubmit={addTransaction}>
                                    <div className="input-group">
                                        <label>📅 Date</label>
                                        <input
                                            type="date"
                                            value={formData.date}
                                            onChange={(e) => setFormData({ ...formData, date: e.target.value })}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>💰 Montant total</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={formData.amount}
                                            onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                            placeholder="100.00"
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>👤 Payé par</label>
                                        <select
                                            value={formData.payer}
                                            onChange={(e) => setFormData({ ...formData, payer: e.target.value })}
                                            required
                                        >
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="checkbox-group">
                                        <input
                                            type="checkbox"
                                            id="isShared"
                                            checked={formData.isShared}
                                            onChange={(e) => setFormData({ ...formData, isShared: e.target.checked })}
                                        />
                                        <label htmlFor="isShared">🤝 Partager cette dépense</label>
                                    </div>

                                    {formData.isShared ? (
                                        <div className="share-inputs">
                                            <div className="share-input-group">
                                                <label>Part de {userName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={formData.userShare}
                                                    onChange={(e) => {
                                                        const userVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(formData.amount) || 0;
                                                        setFormData({ 
                                                            ...formData, 
                                                            userShare: e.target.value,
                                                            partnerShare: (total - userVal).toFixed(2)
                                                        });
                                                    }}
                                                    placeholder="50.00"
                                                />
                                            </div>
                                            <div className="share-input-group">
                                                <label>Part de {partnerName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={formData.partnerShare}
                                                    onChange={(e) => {
                                                        const partnerVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(formData.amount) || 0;
                                                        setFormData({ 
                                                            ...formData, 
                                                            partnerShare: e.target.value,
                                                            userShare: (total - partnerVal).toFixed(2)
                                                        });
                                                    }}
                                                    placeholder="50.00"
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="input-group">
                                            <label>Pour qui ?</label>
                                            <select
                                                value={formData.beneficiary}
                                                onChange={(e) => setFormData({ ...formData, beneficiary: e.target.value })}
                                                required
                                            >
                                                <option value={userName}>{userName}</option>
                                                <option value={partnerName}>{partnerName}</option>
                                            </select>
                                        </div>
                                    )}

                                    <div className="input-group">
                                        <label>🏪 Marchand (optionnel)</label>
                                        <input
                                            type="text"
                                            value={formData.vendor}
                                            onChange={(e) => setFormData({ ...formData, vendor: e.target.value })}
                                            placeholder="IGA, Tim Hortons..."
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>📂 Catégorie</label>
                                        <select
                                            value={formData.category}
                                            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        >
                                            <option value="epicerie">🛒 Épicerie</option>
                                            <option value="restaurant">🍽️ Restaurant</option>
                                            <option value="transport">🚗 Transport</option>
                                            <option value="loisirs">🎮 Loisirs</option>
                                            <option value="pharmacie">💊 Pharmacie</option>
                                            <option value="entretien">🔧 Entretien</option>
                                            <option value="electricite">⚡ Électricité</option>
                                            <option value="hypotheque">🏠 Hypothèque</option>
                                            <option value="autre">📦 Autre</option>
                                        </select>
                                    </div>

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            ➕ Ajouter
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="modal" onClick={() => setShowSettings(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">⚙️ Paramètres</h2>
                                <div style={{ marginBottom: '20px' }}>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '10px' }}>
                                        <strong>Vos noms :</strong> {userName} & {partnerName}
                                    </p>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '10px' }}>
                                        <strong>Code de salle :</strong> {roomCode}
                                    </p>
                                    <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', fontStyle: 'italic' }}>
                                        💡 Partagez ce code pour synchroniser vos données
                                    </p>
                                    <p style={{ color: isConnected ? '#4ade80' : '#fbbf24', marginTop: '15px', fontWeight: 'bold' }}>
                                        {isConnected ? '🔥 Connecté à Firebase' : '⚠️ Connexion Firebase perdue'}
                                    </p>
                                </div>
                                <button className="btn" style={{ background: '#e53e3e' }} onClick={resetApp}>
                                    🔄 Réinitialiser l'application
                                </button>
                                <button className="btn btn-secondary" style={{ marginTop: '15px' }} onClick={() => setShowSettings(false)}>
                                    Fermer
                                </button>
                            </div>
                        </div>
                    )}

                    {showEditModal && editingTransaction && (
                        <div className="modal" onClick={() => setShowEditModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">✏️ Modifier la transaction</h2>
                                <form onSubmit={updateTransaction}>
                                    <div className="input-group">
                                        <label>📅 Date</label>
                                        <input
                                            type="date"
                                            value={editingTransaction.date ? editingTransaction.date.split('T')[0] : ''}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, date: new Date(e.target.value).toISOString() })}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>💰 Montant total</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={editingTransaction.amount}
                                            onChange={(e) => {
                                                const newAmount = parseFloat(e.target.value);
                                                if (editingTransaction.isShared) {
                                                    setEditingTransaction({
                                                        ...editingTransaction,
                                                        amount: e.target.value,
                                                        userShare: (newAmount / 2).toFixed(2),
                                                        partnerShare: (newAmount / 2).toFixed(2)
                                                    });
                                                } else {
                                                    setEditingTransaction({ ...editingTransaction, amount: e.target.value });
                                                }
                                            }}
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>👤 Payé par</label>
                                        <select
                                            value={editingTransaction.payer}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, payer: e.target.value })}
                                            required
                                        >
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="checkbox-group">
                                        <input
                                            type="checkbox"
                                            id="editIsShared"
                                            checked={editingTransaction.isShared}
                                            onChange={(e) => {
                                                const amount = parseFloat(editingTransaction.amount);
                                                setEditingTransaction({ 
                                                    ...editingTransaction, 
                                                    isShared: e.target.checked,
                                                    userShare: e.target.checked ? (amount / 2).toFixed(2) : editingTransaction.userShare,
                                                    partnerShare: e.target.checked ? (amount / 2).toFixed(2) : editingTransaction.partnerShare
                                                });
                                            }}
                                        />
                                        <label htmlFor="editIsShared">🤝 Partager cette dépense</label>
                                    </div>

                                    {editingTransaction.isShared ? (
                                        <div className="share-inputs">
                                            <div className="share-input-group">
                                                <label>Part de {userName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editingTransaction.userShare}
                                                    onChange={(e) => {
                                                        const userVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(editingTransaction.amount) || 0;
                                                        setEditingTransaction({ 
                                                            ...editingTransaction, 
                                                            userShare: e.target.value,
                                                            partnerShare: (total - userVal).toFixed(2)
                                                        });
                                                    }}
                                                />
                                            </div>
                                            <div className="share-input-group">
                                                <label>Part de {partnerName}</label>
                                                <input
                                                    type="number"
                                                    step="0.01"
                                                    value={editingTransaction.partnerShare}
                                                    onChange={(e) => {
                                                        const partnerVal = parseFloat(e.target.value) || 0;
                                                        const total = parseFloat(editingTransaction.amount) || 0;
                                                        setEditingTransaction({ 
                                                            ...editingTransaction, 
                                                            partnerShare: e.target.value,
                                                            userShare: (total - partnerVal).toFixed(2)
                                                        });
                                                    }}
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="input-group">
                                            <label>Pour qui ?</label>
                                            <select
                                                value={editingTransaction.beneficiary}
                                                onChange={(e) => setEditingTransaction({ ...editingTransaction, beneficiary: e.target.value })}
                                                required
                                            >
                                                <option value={userName}>{userName}</option>
                                                <option value={partnerName}>{partnerName}</option>
                                            </select>
                                        </div>
                                    )}

                                    <div className="input-group">
                                        <label>🏪 Marchand (optionnel)</label>
                                        <input
                                            type="text"
                                            value={editingTransaction.vendor}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, vendor: e.target.value })}
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>📂 Catégorie</label>
                                        <select
                                            value={editingTransaction.category}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, category: e.target.value })}
                                        >
                                            <option value="epicerie">🛒 Épicerie</option>
                                            <option value="restaurant">🍽️ Restaurant</option>
                                            <option value="transport">🚗 Transport</option>
                                            <option value="loisirs">🎮 Loisirs</option>
                                            <option value="pharmacie">💊 Pharmacie</option>
                                            <option value="entretien">🔧 Entretien</option>
                                            <option value="electricite">⚡ Électricité</option>
                                            <option value="hypotheque">🏠 Hypothèque</option>
                                            <option value="autre">📦 Autre</option>
                                        </select>
                                    </div>

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => {
                                            setShowEditModal(false);
                                            setEditingTransaction(null);
                                        }}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            💾 Enregistrer
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<BudgetDuo />, document.getElementById('root'));
    </script>
</body>
</html>
