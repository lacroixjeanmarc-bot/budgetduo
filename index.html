                                                            cursor: 'pointer',
                                                            fontSize: '0.9rem',
                                                            color: 'var(--text-primary)'
                                                        }}
                                                        onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-secondary)'}
                                                        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                                                    >
                                                        📸 Prendre une photo
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    {/* Afficher les photos sous le champ montant */}
                                    {selectedImages.length > 0 && (
                                        <div style={{
                                            display: 'grid',
                                            gridTemplateColumns: 'repeat(auto-fill, minmax(80px, 1fr))',
                                            gap: '8px',
                                            marginTop: '12px'
                                        }}>
                                            {selectedImages.map((img, index) => (
                                                <div key={index} style={{position: 'relative'}}>
                                                    <img 
                                                        src={img.preview} 
                                                        alt={`Reçu ${index + 1}`}
                                                        style={{
                                                            width: '100%',
                                                            height: '80px',
                                                            objectFit: 'cover',
                                                            borderRadius: '6px',
                                                            border: '1px solid var(--border)'
                                                        }}
                                                    />
                                                    <button
                                                        type="button"
                                                        onClick={() => removeImage(index)}
                                                        style={{
                                                            position: 'absolute',
                                                            top: '4px',
                                                            right: '4px',
                                                            background: 'rgba(239, 68, 68, 0.9)',
                                                            border: 'none',
                                                            borderRadius: '50%',
                                                            width: '20px',
                                                            height: '20px',
                                                            color: 'white',
                                                            cursor: 'pointer',
                                                            fontSize: '0.7rem',
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            justifyContent: 'center'
                                                        }}
                                                    >
                                                        ✕
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    
                                    {selectedImages.length === 3 && (
                                        <div style={{
                                            marginTop: '8px',
                                            fontSize: '0.75rem',
                                            color: 'var(--text-secondary)',
                                            textAlign: 'center'
                                        }}>
                                            Maximum de 3 photos atteint
                                        </div>
                                    )}
                                </div>

                                {/* Payé par + Date côte à côte */}
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                                    <div className="input-group">
                                        <label>{transactionType === 'transfer' ? 'Payé par' : 'Payeur'}</label>
                                        <select value={payer} onChange={(e) => setPayer(e.target.value)}>
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Date</label>
                                        <input
                                            type="date"
                                            value={date}
                                            onChange={(e) => setDate(e.target.value)}
                                            required
                                        />
                                    </div>
                                </div>

                                {transactionType === 'transfer' && (
                                    <div className="input-group">
                                        <label>Transférer à</label>
                                        <select value={beneficiary} onChange={(e) => setBeneficiary(e.target.value)}>
                                            <option value={payer === userName ? partnerName : userName}>
                                                {payer === userName ? partnerName : userName}
                                            </option>
                                        </select>
                                    </div>
                                )}

                                {transactionType !== 'transfer' && (
                                    <>
                                        <div className="checkbox-group">
                                            <input
                                                type="checkbox"
                                                id="shared"
                                                checked={isShared}
                                                onChange={(e) => {
                                                    setIsShared(e.target.checked);
                                                    setCustomAmounts(false);
                                                }}
                                            />
                                            <label htmlFor="shared">
                                                {transactionType === 'expense' ? 'Dépense partagée 50/50' : 'Revenu partagé 50/50'}
                                            </label>
                                        </div>

                                        {!isShared && (
                                            <>
                                                <div className="checkbox-group">
                                                    <input
                                                        type="checkbox"
                                                        id="customAmounts"
                                                        checked={customAmounts}
                                                        onChange={(e) => {
                                                            setCustomAmounts(e.target.checked);
                                                            // Pré-remplir à 50/50 quand on active
                                                            if (e.target.checked && amount) {
                                                                const half = (parseFloat(amount) / 2).toFixed(2);
                                                                setUserCustomAmount(half);
                                                                setPartnerCustomAmount(half);
                                                            }
                                                        }}
                                                    />
                                                    <label htmlFor="customAmounts">
                                                        Montants personnalisés
                                                    </label>
                                                </div>

                                                {customAmounts ? (
                                                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                                                        <div className="input-group">
                                                            <label>{userName} ({currencySymbol})</label>
                                                            <input
                                                                type="number"
                                                                step="0.01"
                                                                value={userCustomAmount}
                                                                onChange={(e) => {
                                                                    const val = e.target.value;
                                                                    setUserCustomAmount(val);
                                                                    // Calculer automatiquement l'autre montant
                                                                    if (val && amount) {
                                                                        const remaining = parseFloat(amount) - parseFloat(val);
                                                                        setPartnerCustomAmount(remaining > 0 ? remaining.toFixed(2) : '0');
                                                                    }
                                                                }}
                                                                placeholder="0.00"
                                                                max={amount}
                                                            />
                                                        </div>
                                                        <div className="input-group">
                                                            <label>{partnerName} ({currencySymbol})</label>
                                                            <input
                                                                type="number"
                                                                step="0.01"
                                                                value={partnerCustomAmount}
                                                                onChange={(e) => {
                                                                    const val = e.target.value;
                                                                    setPartnerCustomAmount(val);
                                                                    // Calculer automatiquement l'autre montant
                                                                    if (val && amount) {
                                                                        const remaining = parseFloat(amount) - parseFloat(val);
                                                                        setUserCustomAmount(remaining > 0 ? remaining.toFixed(2) : '0');
                                                                    }
                                                                }}
                                                                placeholder="0.00"
                                                                max={amount}
                                                            />
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="input-group">
                                                        <label>Bénéficiaire</label>
                                                        <select value={beneficiary} onChange={(e) => setBeneficiary(e.target.value)}>
                                                            <option value={userName}>{userName}</option>
                                                            <option value={partnerName}>{partnerName}</option>
                                                        </select>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </>
                                )}

                                <div style={{display: 'flex', gap: '8px'}}>
                                    <button type="submit" className="btn" style={{flex: 2}}>
                                        {editingTransaction ? '✅ Sauvegarder' : '➕ Ajouter'}
                                    </button>

                                    {editingTransaction && (
                                        <>
                                            <button 
                                                type="button" 
                                                className="btn btn-secondary"
                                                onClick={cancelEdit}
                                                style={{flex: 1}}
                                            >
                                                ✖️ Annuler
                                            </button>
                                            <button 
                                                type="button" 
                                                className="btn btn-danger"
                                                onClick={() => {
                                                    deleteTransaction(editingTransaction);
                                                    cancelEdit();
                                                }}
                                                style={{flex: 1}}
                                            >
                                                🗑️ Supprimer
                                            </button>
                                        </>
                                    )}
                                </div>
                            </form>
                        </div>
                    )}

                    {activeTab === 'list' && (
                        <div className="tab-content active">
                            {monthTransactions.length > 0 && (
                                <div className="sort-controls">
                                    <span className="sort-label">Trier par:</span>
                                    <select 
                                        className="sort-select"
                                        value={sortBy}
                                        onChange={(e) => setSortBy(e.target.value)}
                                    >
                                        <option value="date">Date</option>
                                        <option value="amount">Montant</option>
                                        <option value="vendor">Nom</option>
                                        <option value="type">Type</option>
                                    </select>
                                    <button 
                                        className="sort-order-button"
                                        onClick={() => setSortOrder(sortOrder === 'asc' ? 'desc' : 'asc')}
                                    >
                                        {sortOrder === 'asc' ? '↑' : '↓'}
                                    </button>
                                </div>
                            )}

                            {sortedTransactions.length === 0 ? (
                                <div className="empty-state">
                                    <div className="empty-state-icon">📭</div>
                                    <div>Aucune transaction ce mois-ci</div>
                                </div>
                            ) : (
                                <div className="transactions-list">
                                    {sortedTransactions.map(trans => (
                                        <div 
                                            key={trans.id} 
                                            className={`transaction-item ${trans.type}`}
                                        >
                                            <div className="transaction-left">
                                                <div className="transaction-vendor">{trans.vendor}</div>
                                                <div className="transaction-meta">
                                                    <span className="transaction-detail">
                                                        {categories[trans.category]?.icon} {categories[trans.category]?.name}
                                                    </span>
                                                    <span className="transaction-detail">📅 {new Date(trans.date).toLocaleDateString('fr-CA')}</span>
                                                    <span className="transaction-detail">👤 {trans.payer}</span>
                                                    {trans.isShared && <span className="transaction-detail">🤝 Partagé</span>}
                                                </div>
                                                {trans.photos && trans.photos.length > 0 && (
                                                    <div style={{
                                                        display: 'flex',
                                                        gap: '6px',
                                                        marginTop: '8px',
                                                        flexWrap: 'wrap'
                                                    }}>
                                                        {trans.photos.map((photo, index) => (
                                                            <img
                                                                key={index}
                                                                src={photo}
                                                                alt={`Reçu ${index + 1}`}
                                                                onClick={() => setViewPhotoModal({photo, vendor: trans.vendor})}
                                                                style={{
                                                                    width: '60px',
                                                                    height: '60px',
                                                                    objectFit: 'cover',
                                                                    borderRadius: '6px',
                                                                    border: '1px solid var(--border)',
                                                                    cursor: 'pointer'
                                                                }}
                                                            />
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="transaction-right">
                                                <div className={`transaction-amount ${trans.type}`}>
                                                    {trans.type === 'expense' ? '-' : '+'}{currencySymbol}{(trans.amount || 0).toFixed(2)}
                                                </div>
                                                <div className="transaction-type">
                                                    {trans.type === 'expense' ? 'Dépense' : trans.type === 'income' ? 'Revenu' : 'Transfert'}
                                                </div>
                                                <button 
                                                    className="transaction-delete"
                                                    onClick={() => startEditTransaction(trans)}
                                                    style={{
                                                        borderColor: 'var(--accent)',
                                                        color: 'var(--accent)',
                                                        marginTop: '4px'
                                                    }}
                                                >
                                                    ✏️ Modifier
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {showSettings && (
                        <div className="modal" onClick={() => setShowSettings(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h2 className="modal-title">Paramètres</h2>
                                </div>

                                <div className="settings-tabs">
                                    <button 
                                        className={`settings-tab ${settingsTab === 'general' ? 'active' : ''}`}
                                        onClick={() => setSettingsTab('general')}
                                    >
                                        Général
                                    </button>
                                    <button 
                                        className={`settings-tab ${settingsTab === 'categories' ? 'active' : ''}`}
                                        onClick={() => setSettingsTab('categories')}
                                    >
                                        Catégories
                                    </button>
                                    <button 
                                        className={`settings-tab ${settingsTab === 'history' ? 'active' : ''}`}
                                        onClick={() => setSettingsTab('history')}
                                    >
                                        Historique ({deletedTransactions.length})
                                    </button>
                                    <button 
                                        className={`settings-tab ${settingsTab === 'about' ? 'active' : ''}`}
                                        onClick={() => setSettingsTab('about')}
                                    >
                                        À propos
                                    </button>
                                </div>

                                {settingsTab === 'general' && (
                                    <>
                                        <div className="info-section">
                                            <div className="info-section-title">👥 Utilisateurs</div>
                                            <div className="input-group">
                                                <label>Votre nom</label>
                                                <input
                                                    type="text"
                                                    value={userName}
                                                    onChange={(e) => {
                                                        setUserName(e.target.value);
                                                        const session = JSON.parse(localStorage.getItem('budgetduo_session'));
                                                        session.userName = e.target.value;
                                                        localStorage.setItem('budgetduo_session', JSON.stringify(session));
                                                    }}
                                                    placeholder="Votre nom"
                                                />
                                            </div>
                                            <div className="input-group">
                                                <label>Nom du partenaire</label>
                                                <input
                                                    type="text"
                                                    value={partnerName}
                                                    onChange={(e) => {
                                                        setPartnerName(e.target.value);
                                                        const session = JSON.parse(localStorage.getItem('budgetduo_session'));
                                                        session.partnerName = e.target.value;
                                                        localStorage.setItem('budgetduo_session', JSON.stringify(session));
                                                    }}
                                                    placeholder="Nom du partenaire"
                                                />
                                            </div>
                                        </div>

                                        <div className="info-section">
                                            <div className="info-section-title">📊 Session</div>
                                            <div className="info-section-content">
                                                <strong>Code:</strong> {sessionCode}<br/>
                                                <strong>Devise:</strong> {currency}<br/>
                                                <strong>Chiffrement:</strong> {isEncryptionEnabled ? '🔒 Activé (AES-256)' : '⚠️ Désactivé'}
                                            </div>
                                        </div>

                                        <div style={{marginBottom: '16px'}}>
                                            <button className="btn" onClick={exportToCSV}>
                                                📥 Exporter en CSV
                                            </button>
                                        </div>

                                        <div style={{marginBottom: '16px'}}>
                                            <button className="btn btn-danger" onClick={resetApp}>
                                                🗑️ Réinitialiser l'application
                                            </button>
                                        </div>

                                        <div className="modal-buttons">
                                            <button className="btn btn-secondary" onClick={() => setShowSettings(false)}>
                                                Fermer
                                            </button>
                                        </div>
                                    </>
                                )}

                                {settingsTab === 'categories' && (
                                    <>
                                        <div className="info-section">
                                            <div className="info-section-title">📁 Catégories existantes</div>
                                            <div className="category-list">
                                                {Object.entries(categories).map(([id, cat]) => (
                                                    <div key={id} className="category-item">
                                                        <div className="category-item-left">
                                                            <span className="category-icon">{cat.icon}</span>
                                                            <span className="category-name">{cat.name}</span>
                                                        </div>
                                                        {Object.keys(categories).length > 1 && (
                                                            <button 
                                                                className="btn-delete-category"
                                                                onClick={() => deleteCategory(id)}
                                                            >
                                                                Supprimer
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="info-section">
                                            <div className="info-section-title">➕ Ajouter une catégorie</div>
                                            
                                            <div className="input-group">
                                                <label>Icône</label>
                                                <div style={{display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '8px'}}>
                                                    <div style={{
                                                        fontSize: '2rem',
                                                        padding: '8px 16px',
                                                        background: 'var(--bg-card)',
                                                        borderRadius: '6px',
                                                        border: '1px solid var(--border)'
                                                    }}>
                                                        {newCategoryIcon}
                                                    </div>
                                                    <button 
                                                        className="btn btn-secondary"
                                                        onClick={() => setShowIconPicker(!showIconPicker)}
                                                        style={{flex: 1}}
                                                        type="button"
                                                    >
                                                        {showIconPicker ? 'Fermer' : 'Choisir un icône'}
                                                    </button>
                                                </div>
                                                
                                                {showIconPicker && (
                                                    <div className="icon-picker">
                                                        {AVAILABLE_ICONS.map(icon => (
                                                            <div
                                                                key={icon}
                                                                className={`icon-option ${newCategoryIcon === icon ? 'selected' : ''}`}
                                                                onClick={() => setNewCategoryIcon(icon)}
                                                            >
                                                                {icon}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="input-group">
                                                <label>Nom de la catégorie</label>
                                                <input
                                                    type="text"
                                                    value={newCategoryName}
                                                    onChange={(e) => setNewCategoryName(e.target.value)}
                                                    placeholder="Ex: Streaming, Cadeaux..."
                                                />
                                            </div>

                                            <button 
                                                className="btn" 
                                                onClick={addCategory}
                                                disabled={!newCategoryName.trim()}
                                                type="button"
                                            >
                                                ➕ Ajouter la catégorie
                                            </button>
                                        </div>

                                        <div className="modal-buttons">
                                            <button className="btn btn-secondary" onClick={() => setShowSettings(false)}>
                                                Fermer
                                            </button>
                                        </div>
                                    </>
                                )}

                                {settingsTab === 'history' && (
                                    <>
                                        <div className="info-section">
                                            <div className="info-section-title">🗑️ Transactions supprimées</div>
                                            {deletedTransactions.length === 0 ? (
                                                <div className="info-section-content" style={{textAlign: 'center', padding: '20px'}}>
                                                    Aucune transaction supprimée
                                                </div>
                                            ) : (
                                                <div style={{
                                                    maxHeight: '400px',
                                                    overflowY: 'auto',
                                                    marginTop: '12px'
                                                }}>
                                                    {deletedTransactions.map((trans, index) => (
                                                        <div key={index} style={{
                                                            background: 'var(--bg-card)',
                                                            border: '1px solid var(--border)',
                                                            borderRadius: '6px',
                                                            padding: '12px',
                                                            marginBottom: '8px'
                                                        }}>
                                                            <div style={{
                                                                display: 'flex',
                                                                justifyContent: 'space-between',
                                                                alignItems: 'center',
                                                                marginBottom: '4px'
                                                            }}>
                                                                <strong>{trans.vendor}</strong>
                                                                <span style={{color: 'var(--expense-color)'}}>
                                                                    {currencySymbol}{trans.amount?.toFixed(2) || '0.00'}
                                                                </span>
                                                            </div>
                                                            <div style={{
                                                                fontSize: '0.8rem',
                                                                color: 'var(--text-secondary)',
                                                                marginBottom: '8px'
                                                            }}>
                                                                📅 {new Date(trans.date).toLocaleDateString('fr-CA')} • 
                                                                Supprimé le {new Date(trans.deletedAt).toLocaleDateString('fr-CA')}
                                                            </div>
                                                            <button 
                                                                className="btn btn-secondary"
                                                                onClick={() => restoreTransaction(index)}
                                                                style={{width: '100%', padding: '6px'}}
                                                            >
                                                                ↩️ Restaurer
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="modal-buttons">
                                            <button className="btn btn-secondary" onClick={() => setShowSettings(false)}>
                                                Fermer
                                            </button>
                                        </div>
                                    </>
                                )}

                                {settingsTab === 'about' && (
                                    <>
                                        <div className="info-section">
                                            <div className="info-section-title">💡 Qu'est-ce que BudgetDuo?</div>
                                            <div className="info-section-content">
                                                BudgetDuo est une application web de gestion des dépenses partagées pour couples, 
                                                conçue pour simplifier la gestion financière à deux.
                                            </div>
                                        </div>

                                        <div className="info-section">
                                            <div className="info-section-title">✨ Fonctionnalités principales</div>
                                            <div className="info-section-content">
                                                <ul>
                                                    <li>🔒 <strong>Chiffrement AES-256</strong> - Protection de niveau bancaire</li>
                                                    <li>💳 <strong>3 types de transactions</strong> - Dépenses, revenus, transferts</li>
                                                    <li>📸 <strong>Photos de reçus</strong> - Jusqu'à 3 photos par transaction</li>
                                                    <li>📊 <strong>Balance automatique</strong> - Calcul en temps réel de qui doit quoi</li>
                                                    <li>🗓️ <strong>Navigation par mois</strong> - Vue mensuelle claire</li>
                                                    <li>🔀 <strong>Tri des transactions</strong> - Par date, montant, nom ou type</li>
                                                    <li>🏷️ <strong>Catégories personnalisables</strong> - Avec émojis</li>
                                                    <li>📥 <strong>Export CSV</strong> - Compatible Excel et Google Sheets</li>
                                                    <li>☁️ <strong>Synchronisation cloud</strong> - Firebase en temps réel</li>
                                                    <li>🎨 <strong>Design moderne</strong> - Interface épurée noir et blanc</li>
                                                    <li>📱 <strong>Responsive</strong> - Fonctionne sur mobile, tablette et PC</li>
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="info-section">
                                            <div className="info-section-title">🔐 Sécurité & Confidentialité</div>
                                            <div className="info-section-content">
                                                <ul>
                                                    <li><strong>Chiffrement de bout en bout:</strong> Vos données sont chiffrées localement avant d'être envoyées</li>
                                                    <li><strong>Zéro accès tiers:</strong> Personne ne peut lire vos données sans votre mot de passe</li>
                                                    <li><strong>Standard militaire:</strong> AES-256-GCM + PBKDF2 (100 000 itérations)</li>
                                                    <li><strong>Stockage sécurisé:</strong> Hébergé sur Firebase (Google Cloud)</li>
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="credits">
                                            <div className="credits-title">👨‍💻 Développé par</div>
                                            <div className="credits-author">Jean-Marc Lacroix</div>
                                            <div className="credits-email">
                                                Vos commentaires sont les bienvenus!<br/>
                                                <a href="mailto:budgetduo.app@gmail.com">budgetduo.app@gmail.com</a>
                                            </div>
                                        </div>

                                        <div className="info-section" style={{
                                            background: 'var(--bg-secondary)',
                                            textAlign: 'center',
                                            fontSize: '0.8rem',
                                            color: 'var(--text-secondary)'
                                        }}>
                                            Version 2.0 - Janvier 2026<br/>
                                            Propulsé par React & Firebase
                                        </div>

                                        <div className="modal-buttons">
                                            <button className="btn btn-secondary" onClick={() => setShowSettings(false)}>
                                                Fermer
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {viewPhotoModal && (
                        <div className="modal" onClick={() => setViewPhotoModal(null)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '800px'}}>
                                <div className="modal-header">
                                    <h2 className="modal-title">📸 Photo du reçu</h2>
                                    <div className="modal-subtitle">{viewPhotoModal.vendor}</div>
                                </div>
                                <div style={{textAlign: 'center'}}>
                                    <img 
                                        src={viewPhotoModal.photo} 
                                        alt="Reçu en grand" 
                                        style={{
                                            maxWidth: '100%',
                                            maxHeight: '70vh',
                                            borderRadius: '8px',
                                            border: '1px solid var(--border)'
                                        }}
                                    />
                                </div>
                                <div className="modal-buttons">
                                    <button className="btn btn-secondary" onClick={() => setViewPhotoModal(null)}>
                                        Fermer
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<BudgetDuo />, document.getElementById('root'));
    </script>
</body>
</html>
