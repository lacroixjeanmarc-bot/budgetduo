<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetDuo 💑</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Karla:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151936;
            --bg-card: #1a1f3a;
            --accent-pink: #ff6b9d;
            --accent-blue: #4fc3f7;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Karla', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1042 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, white, transparent),
                radial-gradient(2px 2px at 60% 70%, white, transparent),
                radial-gradient(1px 1px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 80% 10%, white, transparent),
                radial-gradient(2px 2px at 90% 60%, white, transparent),
                radial-gradient(1px 1px at 33% 80%, white, transparent);
            background-size: 200% 200%;
            background-position: 0% 0%;
            animation: stars 60s ease-in-out infinite;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes stars {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, rgba(79, 195, 247, 0.1) 100%);
            border-radius: 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 107, 157, 0.2);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '💑';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 120px;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-style: italic;
        }

        .setup-screen {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setup-screen h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--accent-pink);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Karla', sans-serif;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .balance-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .balance-label {
            position: relative;
            z-index: 1;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .balance-amount {
            position: relative;
            z-index: 1;
            font-family: 'DM Serif Display', serif;
            font-size: 4rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .balance-text {
            position: relative;
            z-index: 1;
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .user-stats {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .user-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .user-stat-amount {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .month-nav button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .month-nav button:hover {
            background: var(--accent-pink);
            transform: scale(1.1);
        }

        .current-month {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--accent-pink);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 30px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .transactions-list {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .transactions-header {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .transaction-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-pink);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .transaction-type {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .transaction-amount {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
        }

        .transaction-details {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .transaction-detail {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 107, 157, 0.3);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--accent-pink);
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        select {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Karla', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2rem;
            font-style: italic;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .sync-status.connected {
            color: #4ade80;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .balance-amount {
                font-size: 3rem;
            }

            .user-stats {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .modal-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // REMPLACE avec ta configuration Firebase
       const firebaseConfig = {
  apiKey: "AIzaSyBP4VP0zfXMDGhWmparJAnue-2mIpgDWfE",
  authDomain: "budgetduo-96f22.firebaseapp.com",
  databaseURL: "https://budgetduo-96f22-default-rtdb.firebaseio.com",
  projectId: "budgetduo-96f22",
  storageBucket: "budgetduo-96f22.firebasestorage.app",
  messagingSenderId: "44840005819",
  appId: "1:44840005819:web:5344367cda9a500a4a799e"
};

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function BudgetDuo() {
            const [isSetup, setIsSetup] = useState(false);
            const [userName, setUserName] = useState('');
            const [partnerName, setPartnerName] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showEditModal, setShowEditModal] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [editingTransaction, setEditingTransaction] = useState(null);

            const [formData, setFormData] = useState({
                type: 'shared',
                amount: '',
                vendor: '',
                category: 'epicerie',
                payer: ''
            });

            useEffect(() => {
                const connectedRef = database.ref('.info/connected');
                connectedRef.on('value', (snapshot) => {
                    setIsConnected(snapshot.val() === true);
                });

                const savedUserName = localStorage.getItem('userName');
                const savedPartnerName = localStorage.getItem('partnerName');
                const savedRoomCode = localStorage.getItem('roomCode');

                if (savedUserName && savedPartnerName && savedRoomCode) {
                    setUserName(savedUserName);
                    setPartnerName(savedPartnerName);
                    setRoomCode(savedRoomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: savedUserName }));
                    loadTransactions(savedRoomCode);
                }

                return () => {
                    connectedRef.off();
                };
            }, []);

            const loadTransactions = (code) => {
                const transactionsRef = database.ref(`rooms/${code}/transactions`);
                
                transactionsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const transArray = Object.values(data).sort((a, b) => b.id - a.id);
                        setTransactions(transArray);
                    } else {
                        setTransactions([]);
                    }
                });
            };

            const handleSetup = (e) => {
                e.preventDefault();
                if (userName && partnerName && roomCode) {
                    localStorage.setItem('userName', userName);
                    localStorage.setItem('partnerName', partnerName);
                    localStorage.setItem('roomCode', roomCode);
                    setIsSetup(true);
                    setFormData(prev => ({ ...prev, payer: userName }));
                    loadTransactions(roomCode);
                }
            };

            const addTransaction = (e) => {
                e.preventDefault();
                
                const newTransaction = {
                    id: Date.now(),
                    type: formData.type,
                    amount: parseFloat(formData.amount),
                    vendor: formData.vendor,
                    category: formData.category,
                    payer: formData.payer,
                    date: new Date().toISOString(),
                    month: currentMonth.getMonth(),
                    year: currentMonth.getFullYear()
                };

                const transactionsRef = database.ref(`rooms/${roomCode}/transactions/${newTransaction.id}`);
                transactionsRef.set(newTransaction);

                setFormData({
                    type: 'shared',
                    amount: '',
                    vendor: '',
                    category: 'epicerie',
                    payer: formData.payer
                });
                setShowModal(false);
            };

            const deleteTransaction = (transId) => {
                if (confirm('Supprimer cette transaction ?')) {
                    const transactionRef = database.ref(`rooms/${roomCode}/transactions/${transId}`);
                    transactionRef.remove();
                }
            };

            const editTransaction = (trans) => {
                setEditingTransaction(trans);
                setShowEditModal(true);
            };

            const updateTransaction = (e) => {
                e.preventDefault();
                
                if (!editingTransaction) return;

                const updatedTransaction = {
                    ...editingTransaction,
                    type: editingTransaction.type,
                    amount: parseFloat(editingTransaction.amount),
                    vendor: editingTransaction.vendor,
                    category: editingTransaction.category,
                    payer: editingTransaction.payer,
                    date: editingTransaction.date,
                };

                const transactionRef = database.ref(`rooms/${roomCode}/transactions/${editingTransaction.id}`);
                transactionRef.set(updatedTransaction);

                setShowEditModal(false);
                setEditingTransaction(null);
            };

            const calculateBalance = () => {
                const monthTransactions = transactions.filter(t => {
                    const transDate = new Date(t.date);
                    return transDate.getMonth() === currentMonth.getMonth() &&
                           transDate.getFullYear() === currentMonth.getFullYear();
                });

                let userTotal = 0;
                let partnerTotal = 0;

                monthTransactions.forEach(trans => {
                    if (trans.type === 'shared') {
                        if (trans.payer === userName) {
                            partnerTotal += trans.amount / 2;
                        } else {
                            userTotal += trans.amount / 2;
                        }
                    } else if (trans.type === 'personal') {
                        if (trans.payer === userName) {
                            partnerTotal += trans.amount;
                        } else {
                            userTotal += trans.amount;
                        }
                    } else if (trans.type === 'refund') {
                        userTotal -= trans.amount / 2;
                        partnerTotal -= trans.amount / 2;
                    }
                });

                const balance = partnerTotal - userTotal;

                return { userTotal, partnerTotal, balance, transactions: monthTransactions };
            };

            const changeMonth = (delta) => {
                const newMonth = new Date(currentMonth);
                newMonth.setMonth(newMonth.getMonth() + delta);
                setCurrentMonth(newMonth);
            };

            const formatMonth = (date) => {
                return date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
            };

            const getTypeLabel = (type) => {
                const labels = {
                    shared: '🤝 Partagée',
                    personal: '👤 Personnelle',
                    refund: '💰 Remboursement',
                    transfer: '💸 Transfert'
                };
                return labels[type] || type;
            };

            const getCategoryLabel = (category) => {
                const labels = {
                    epicerie: '🛒 Épicerie',
                    restaurant: '🍽️ Restaurant',
                    transport: '🚗 Transport',
                    loisirs: '🎮 Loisirs',
                    pharmacie: '💊 Pharmacie',
                    entretien: '🔧 Entretien',
                    electricite: '⚡ Électricité',
                    hypotheque: '🏠 Hypothèque',
                    autre: '📦 Autre'
                };
                return labels[category] || category;
            };

            const resetApp = () => {
                if (confirm('Voulez-vous vraiment réinitialiser l\'application ?')) {
                    localStorage.clear();
                    window.location.reload();
                }
            };

            if (!isSetup) {
                return (
                    <div className="app-container">
                        <div className="header">
                            <h1>BudgetDuo</h1>
                            <p className="tagline">Gérez vos finances à deux, en toute simplicité</p>
                        </div>

                        <div className="setup-screen">
                            <h2>✨ Configuration initiale</h2>
                            <form onSubmit={handleSetup}>
                                <div className="input-group">
                                    <label>👤 Votre nom</label>
                                    <input
                                        type="text"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        placeholder="Ex: Marie"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>💑 Nom de votre partenaire</label>
                                    <input
                                        type="text"
                                        value={partnerName}
                                        onChange={(e) => setPartnerName(e.target.value)}
                                        placeholder="Ex: Jean"
                                        required
                                    />
                                </div>

                                <div className="input-group">
                                    <label>🔐 Code de salle</label>
                                    <input
                                        type="text"
                                        value={roomCode}
                                        onChange={(e) => setRoomCode(e.target.value)}
                                        placeholder="Ex: couple2024"
                                        required
                                    />
                                    <small style={{ color: 'var(--text-secondary)', marginTop: '8px', display: 'block' }}>
                                        💡 Utilisez le même code pour synchroniser vos données
                                    </small>
                                </div>

                                <button type="submit" className="btn">
                                    🚀 Commencer
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const { userTotal, partnerTotal, balance, transactions: monthTransactions } = calculateBalance();

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>BudgetDuo</h1>
                        <p className="tagline">{userName} & {partnerName}</p>
                    </div>

                    <div className="balance-card">
                        <div className="balance-label">Bilan du mois</div>
                        <div className="balance-amount">{Math.abs(balance).toFixed(2)} $</div>
                        <div className="balance-text">
                            {Math.abs(balance) < 0.01 ? '✨ Tout est égal !' :
                             balance > 0 ? `💰 ${partnerName} te doit` :
                             `💸 Tu dois à ${partnerName}`}
                        </div>

                        <div className="user-stats">
                            <div className="user-stat">
                                <div className="user-stat-label">{userName}</div>
                                <div className="user-stat-amount">{Math.abs(userTotal).toFixed(2)} $</div>
                            </div>
                            <div className="user-stat">
                                <div className="user-stat-label">{partnerName}</div>
                                <div className="user-stat-amount">{Math.abs(partnerTotal).toFixed(2)} $</div>
                            </div>
                        </div>
                    </div>

                    <div className="month-nav">
                        <button onClick={() => changeMonth(-1)}>◀</button>
                        <div className="current-month">{formatMonth(currentMonth)}</div>
                        <button onClick={() => changeMonth(1)}>▶</button>
                    </div>

                    <button className="add-btn" onClick={() => setShowModal(true)}>
                        ➕ Nouvelle transaction
                    </button>

                    <div className="transactions-list">
                        <div className="transactions-header">
                            📋 Historique {monthTransactions.length > 0 && `(${monthTransactions.length})`}
                        </div>

                        {monthTransactions.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">💭</div>
                                <div className="empty-state-text">Aucune transaction ce mois-ci</div>
                            </div>
                        ) : (
                            monthTransactions.map(trans => (
                                <div key={trans.id} className="transaction-item" onDoubleClick={() => deleteTransaction(trans.id)}>
                                    <div className="transaction-header">
                                        <div className="transaction-type">{getTypeLabel(trans.type)}</div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                            <button 
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    editTransaction(trans);
                                                }}
                                                style={{
                                                    background: 'rgba(255, 255, 255, 0.1)',
                                                    border: 'none',
                                                    borderRadius: '6px',
                                                    padding: '6px 12px',
                                                    color: 'var(--accent-blue)',
                                                    cursor: 'pointer',
                                                    fontSize: '0.9rem',
                                                    transition: 'all 0.2s ease'
                                                }}
                                                onMouseOver={(e) => e.target.style.background = 'rgba(79, 195, 247, 0.2)'}
                                                onMouseOut={(e) => e.target.style.background = 'rgba(255, 255, 255, 0.1)'}
                                            >
                                                ✏️ Modifier
                                            </button>
                                            <div className="transaction-amount">{trans.amount.toFixed(2)} $</div>
                                        </div>
                                    </div>
                                    <div className="transaction-details">
                                        <div className="transaction-detail">
                                            <span>👤</span>
                                            <span>{trans.payer}</span>
                                        </div>
                                        {trans.vendor && (
                                            <div className="transaction-detail">
                                                <span>🏪</span>
                                                <span>{trans.vendor}</span>
                                            </div>
                                        )}
                                        <div className="transaction-detail">
                                            <span>{getCategoryLabel(trans.category)}</span>
                                        </div>
                                        <div className="transaction-detail">
                                            <span>📅</span>
                                            <span>{new Date(trans.date).toLocaleDateString('fr-FR')}</span>
                                        </div>
                                    </div>
                                    <div style={{ 
                                        marginTop: '10px', 
                                        fontSize: '0.75rem', 
                                        color: 'var(--text-secondary)', 
                                        fontStyle: 'italic' 
                                    }}>
                                        💡 Double-clic pour supprimer
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    <button className="settings-btn" onClick={() => setShowSettings(true)}>
                        ⚙️ Paramètres
                    </button>

                    <div className={`sync-status ${isConnected ? 'connected' : ''}`}>
                        {isConnected ? '🔥 Connecté' : '⚠️ Déconnecté'}
                    </div>

                    {showModal && (
                        <div className="modal" onClick={() => setShowModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">➕ Nouvelle transaction</h2>
                                <form onSubmit={addTransaction}>
                                    <div className="input-group">
                                        <label>Type de transaction</label>
                                        <select
                                            value={formData.type}
                                            onChange={(e) => setFormData({ ...formData, type: e.target.value })}
                                        >
                                            <option value="shared">🤝 Partagée (50/50)</option>
                                            <option value="personal">👤 Personnelle (100%)</option>
                                            <option value="refund">💰 Remboursement</option>
                                            <option value="transfer">💸 Transfert</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Montant</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={formData.amount}
                                            onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                            placeholder="25.50"
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Marchand</label>
                                        <input
                                            type="text"
                                            value={formData.vendor}
                                            onChange={(e) => setFormData({ ...formData, vendor: e.target.value })}
                                            placeholder="IGA, Tim Hortons..."
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Catégorie</label>
                                        <select
                                            value={formData.category}
                                            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        >
                                            <option value="epicerie">🛒 Épicerie</option>
                                            <option value="restaurant">🍽️ Restaurant</option>
                                            <option value="transport">🚗 Transport</option>
                                            <option value="loisirs">🎮 Loisirs</option>
                                            <option value="pharmacie">💊 Pharmacie</option>
                                            <option value="entretien">🔧 Entretien</option>
                                            <option value="electricite">⚡ Électricité</option>
                                            <option value="hypotheque">🏠 Hypothèque</option>
                                            <option value="autre">📦 Autre</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Qui a payé ?</label>
                                        <select
                                            value={formData.payer}
                                            onChange={(e) => setFormData({ ...formData, payer: e.target.value })}
                                        >
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            Ajouter
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="modal" onClick={() => setShowSettings(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">⚙️ Paramètres</h2>
                                <div style={{ marginBottom: '20px' }}>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '10px' }}>
                                        <strong>Vos noms :</strong> {userName} & {partnerName}
                                    </p>
                                    <p style={{ color: 'var(--text-secondary)', marginBottom: '10px' }}>
                                        <strong>Code de salle :</strong> {roomCode}
                                    </p>
                                    <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', fontStyle: 'italic' }}>
                                        💡 Partagez ce code pour synchroniser vos données
                                    </p>
                                    <p style={{ color: isConnected ? '#4ade80' : '#fbbf24', marginTop: '15px', fontWeight: 'bold' }}>
                                        {isConnected ? '🔥 Connecté à Firebase' : '⚠️ Connexion Firebase perdue'}
                                    </p>
                                </div>
                                <button className="btn" style={{ background: '#e53e3e' }} onClick={resetApp}>
                                    🔄 Réinitialiser l'application
                                </button>
                                <button className="btn btn-secondary" style={{ marginTop: '15px' }} onClick={() => setShowSettings(false)}>
                                    Fermer
                                </button>
                            </div>
                        </div>
                    )}

                    {showEditModal && editingTransaction && (
                        <div className="modal" onClick={() => setShowEditModal(false)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">✏️ Modifier la transaction</h2>
                                <form onSubmit={updateTransaction}>
                                    <div className="input-group">
                                        <label>Type de transaction</label>
                                        <select
                                            value={editingTransaction.type}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, type: e.target.value })}
                                        >
                                            <option value="shared">🤝 Partagée (50/50)</option>
                                            <option value="personal">👤 Personnelle (100%)</option>
                                            <option value="refund">💰 Remboursement</option>
                                            <option value="transfer">💸 Transfert</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Montant</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            value={editingTransaction.amount}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, amount: e.target.value })}
                                            placeholder="25.50"
                                            required
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Marchand</label>
                                        <input
                                            type="text"
                                            value={editingTransaction.vendor}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, vendor: e.target.value })}
                                            placeholder="IGA, Tim Hortons..."
                                        />
                                    </div>

                                    <div className="input-group">
                                        <label>Catégorie</label>
                                        <select
                                            value={editingTransaction.category}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, category: e.target.value })}
                                        >
                                            <option value="epicerie">🛒 Épicerie</option>
                                            <option value="restaurant">🍽️ Restaurant</option>
                                            <option value="transport">🚗 Transport</option>
                                            <option value="loisirs">🎮 Loisirs</option>
                                            <option value="pharmacie">💊 Pharmacie</option>
                                            <option value="entretien">🔧 Entretien</option>
                                            <option value="electricite">⚡ Électricité</option>
                                            <option value="hypotheque">🏠 Hypothèque</option>
                                            <option value="autre">📦 Autre</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Qui a payé ?</label>
                                        <select
                                            value={editingTransaction.payer}
                                            onChange={(e) => setEditingTransaction({ ...editingTransaction, payer: e.target.value })}
                                        >
                                            <option value={userName}>{userName}</option>
                                            <option value={partnerName}>{partnerName}</option>
                                        </select>
                                    </div>

                                    <div className="input-group">
                                        <label>Date</label>
                                        <input
                                            type="date"
                                            value={editingTransaction.date ? editingTransaction.date.split('T')[0] : ''}
                                            onChange={(e) => {
                                                const newDate = new Date(e.target.value);
                                                newDate.setHours(12, 0, 0, 0);
                                                setEditingTransaction({ 
                                                    ...editingTransaction, 
                                                    date: newDate.toISOString(),
                                                    month: newDate.getMonth(),
                                                    year: newDate.getFullYear()
                                                });
                                            }}
                                            required
                                        />
                                    </div>

                                    <div className="modal-buttons">
                                        <button type="button" className="btn btn-secondary" onClick={() => {
                                            setShowEditModal(false);
                                            setEditingTransaction(null);
                                        }}>
                                            Annuler
                                        </button>
                                        <button type="submit" className="btn">
                                            💾 Enregistrer
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<BudgetDuo />, document.getElementById('root'));
    </script>
</body>
</html>
