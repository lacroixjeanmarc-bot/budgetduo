<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetDuo - Sécurisé</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-card: #2a2a2a;
            --accent: #0066FF;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #333333;
            --shadow: 0 1px 3px rgba(255, 255, 255, 0.1);
            --expense-color: #3B82F6;
            --income-color: #10B981;
            --transfer-color: #F59E0B;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 12px 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .header-users {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-settings-button {
            position: absolute;
            right: 10px;
            top: 12px;
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-settings-button:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
            text-align: center;
        }

        /* ========== CHIFFREMENT ========== */
        .crypto-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .crypto-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .crypto-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 24px;
        }

        .crypto-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
        }

        .crypto-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .crypto-choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .crypto-choice-btn {
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .crypto-choice-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 102, 255, 0.1);
        }

        .crypto-choice-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .crypto-choice-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .crypto-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #EF4444;
        }

        .crypto-info {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .crypto-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            text-align: center;
        }

        .crypto-message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10B981;
        }

        .crypto-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
        }

        .setup-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            margin: 40px auto;
        }

        .setup-title {
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
        }

        .setup-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 0.9rem;
            cursor: pointer;
            margin: 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover:not(:disabled) {
            background: #0052CC;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--bg-card);
            transform: none;
        }

        .btn-danger {
            background: #EF4444;
        }

        .btn-danger:hover:not(:disabled) {
            background: #DC2626;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            border-radius: 8px 8px 0 0;
        }

        .tab:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab.active {
            color: var(--bg-primary);
            background: white;
            border-bottom-color: white;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .transaction-type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .type-button {
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .type-button:hover {
            border-color: var(--accent);
        }

        .type-button.active {
            border-color: var(--accent);
            background: rgba(0, 102, 255, 0.1);
            color: var(--text-primary);
        }

        .type-icon {
            font-size: 1.2rem;
        }

        .balance-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .balance-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .balance-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .balance-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .balance-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .balance-amount.positive {
            color: var(--income-color);
        }

        .balance-amount.negative {
            color: var(--expense-color);
        }

        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .month-nav-button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .month-nav-button:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .month-display {
            font-size: 1rem;
            font-weight: 600;
        }

        .sort-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }

        .sort-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .sort-select {
            flex: 1;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .sort-order-button {
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .sort-order-button:hover {
            border-color: var(--accent);
        }

        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .transaction-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.2s;
            cursor: pointer;
        }

        .transaction-item:hover {
            border-color: var(--accent);
            background: rgba(0, 102, 255, 0.05);
        }

        .transaction-item.expense {
            border-left: 3px solid var(--expense-color);
        }

        .transaction-item.income {
            border-left: 3px solid var(--income-color);
        }

        .transaction-item.transfer {
            border-left: 3px solid var(--transfer-color);
        }

        .transaction-left {
            flex: 1;
        }

        .transaction-vendor {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .transaction-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .transaction-detail {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .transaction-right {
            text-align: right;
        }

        .transaction-amount {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .transaction-amount.expense {
            color: var(--expense-color);
        }

        .transaction-amount.income {
            color: var(--income-color);
        }

        .transaction-amount.transfer {
            color: var(--transfer-color);
        }

        .transaction-type {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .transaction-delete {
            background: transparent;
            border: 1px solid #EF4444;
            color: #EF4444;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 4px;
            transition: all 0.2s;
        }

        .transaction-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .settings-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
            transition: all 0.2s;
            z-index: 100;
        }

        .settings-button:hover {
            background: #0052CC;
            transform: scale(1.1);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-buttons .btn {
            width: auto;
            flex: 1;
        }

        .info-message {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            color: var(--accent);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* ========== SCAN DE REÇU ========== */
        .receipt-scan-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .scan-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .scan-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 102, 255, 0.05);
        }

        .scan-preview {
            margin-top: 12px;
            text-align: center;
        }

        .scan-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .scan-result {
            margin-top: 12px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .scan-loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .scan-error {
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #EF4444;
            font-size: 0.85rem;
        }

        /* ========== GESTION DES CATÉGORIES ========== */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .category-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon {
            font-size: 1.5rem;
        }

        .category-name {
            font-weight: 500;
        }

        .btn-delete-category {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid #EF4444;
            border-radius: 4px;
            color: #EF4444;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete-category:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .icon-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .icon-option {
            font-size: 1.5rem;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .icon-option:hover {
            background: var(--bg-secondary);
        }

        .icon-option.selected {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ========== SECTIONS D'INFO ========== */
        .info-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .info-section-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .info-section-content {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .info-section-content ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .info-section-content li {
            margin-bottom: 4px;
        }

        .credits {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.1) 0%, rgba(0, 102, 255, 0.05) 100%);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }

        .credits-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .credits-author {
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .credits-email {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .credits-email a {
            color: var(--accent);
            text-decoration: none;
        }

        .credits-email a:hover {
            text-decoration: underline;
        }

        .settings-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .settings-tabs::-webkit-scrollbar {
            height: 2px;
        }

        .settings-tabs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .settings-tab {
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .settings-tab:hover {
            color: var(--text-primary);
        }

        .settings-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .header-settings-button {
                width: 32px;
                height: 32px;

        // ========== MODULE DE CHIFFREMENT ==========
        class CryptoManager {
            constructor() {
                this.algorithm = 'AES-GCM';
                this.keyLength = 256;
                this.saltLength = 16;
                this.ivLength = 12;
                this.iterations = 100000;
            }

            generateSalt() {
                return window.crypto.getRandomValues(new Uint8Array(this.saltLength));
            }

            generateIV() {
                return window.crypto.getRandomValues(new Uint8Array(this.ivLength));
            }

            async deriveKey(password, salt) {
                const encoder = new TextEncoder();
                const passwordBuffer = encoder.encode(password);
                const keyMaterial = await window.crypto.subtle.importKey('raw', passwordBuffer, 'PBKDF2', false, ['deriveBits', 'deriveKey']);
                return window.crypto.subtle.deriveKey(
                    {
                        name: 'PBKDF2',
                        salt: salt,
                        iterations: this.iterations,
                        hash: 'SHA-256'
                    },
                    keyMaterial,
                    {
                        name: this.algorithm,
                        length: this.keyLength
                    },
                    false,
                    ['encrypt', 'decrypt']
                );
            }

            async encrypt(data, password, salt) {
                if (!salt) salt = this.generateSalt();
                const key = await this.deriveKey(password, salt);
                const iv = this.generateIV();
                const encoder = new TextEncoder();
                const dataBuffer = encoder.encode(JSON.stringify(data));
                const encryptedBuffer = await window.crypto.subtle.encrypt({
                    name: this.algorithm,
                    iv: iv
                }, key, dataBuffer);
                return {
                    encrypted: this.bufferToBase64(encryptedBuffer),
                    salt: this.bufferToBase64(salt),
                    iv: this.bufferToBase64(iv)
                };
            }

            async decrypt(encryptedData, password) {
                const encryptedBuffer = this.base64ToBuffer(encryptedData.encrypted);
                const salt = this.base64ToBuffer(encryptedData.salt);
                const iv = this.base64ToBuffer(encryptedData.iv);
                const key = await this.deriveKey(password, salt);
                const decryptedBuffer = await window.crypto.subtle.decrypt({
                    name: this.algorithm,
                    iv: iv
                }, key, encryptedBuffer);
                const decoder = new TextDecoder();
                return JSON.parse(decoder.decode(decryptedBuffer));
            }

            async verifyPassword(password, salt, testData) {
                try {
                    await this.decrypt(testData, password);
                    return true;
                } catch {
                    return false;
                }
            }

            bufferToBase64(buffer) {
                const bytes = new Uint8Array(buffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary);
            }

            base64ToBuffer(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes.buffer;
            }

            async encryptTransaction(transaction, password, salt) {
                const sensitiveData = {
                    amount: transaction.amount,
                    vendor: transaction.vendor,
                    category: transaction.category,
                    beneficiary: transaction.beneficiary,
                    payer: transaction.payer,
                    userShare: transaction.userShare,
                    partnerShare: transaction.partnerShare,
                    isShared: transaction.isShared,
                    photos: transaction.photos
                };
                const encrypted = await this.encrypt(sensitiveData, password, salt);
                
                // Créer un objet PROPRE sans les données sensibles
                return {
                    type: transaction.type,
                    date: transaction.date,
                    timestamp: transaction.timestamp,
                    encrypted: true,
                    encryptedData: encrypted,
                    // Données visibles (non-sensibles)
                    vendor: '[Chiffré]',
                    amount: null,
                    category: null,
                    beneficiary: null,
                    payer: null,
                    userShare: null,
                    partnerShare: null,
                    isShared: null,
                    photos: null
                };
            }

            async decryptTransaction(transaction, password) {
                if (!transaction.encrypted) return transaction;
                try {
                    const decryptedData = await this.decrypt(transaction.encryptedData, password);
                    return {
                        ...transaction,
                        ...decryptedData,
                        encrypted: false
                    };
                } catch (error) {
                    return {
                        ...transaction,
                        error: true,
                        vendor: '[Erreur de déchiffrement]'
                    };
                }
            }
        }

                    } else {
                        if (beneficiary === userName) {
                            userShare = parsedAmount;
                        } else {
                            partnerShare = parsedAmount;
                        }
                    }
                } else if (transactionType === 'income') {
                    if (isShared) {
                        userShare = parsedAmount / 2;
                        partnerShare = parsedAmount / 2;
                    } else if (customAmounts) {
                        // Montants personnalisés
                        const userAmount = parseFloat(userCustomAmount);
                        const partnerAmount = parseFloat(partnerCustomAmount);
                        
                        if (isNaN(userAmount) || isNaN(partnerAmount)) {
                            alert('Montants personnalisés invalides');
                            return;
                        }
                        
                        userShare = userAmount;
                        partnerShare = partnerAmount;
                    } else {
                        if (beneficiary === userName) {
                            userShare = parsedAmount;
                        } else {
                            partnerShare = parsedAmount;
                        }
                    }
                } else if (transactionType === 'transfer') {
                    // CORRECTION: Un transfert ajuste directement la balance
                    // Si userName transfère à partnerName, userName perd de l'argent
                    if (payer === userName) {
                        userShare = -parsedAmount;
                        partnerShare = parsedAmount;
                    } else {
                        userShare = parsedAmount;
                        partnerShare = -parsedAmount;
                    }
                }

                // Stocker les photos en base64
                const photos = selectedImages.map(img => img.preview);

                let newTransaction = {
                    type: transactionType,
                    amount: parsedAmount,
                    vendor,
                    category,
                    date,
                    payer,
                    beneficiary,
                    isShared,
                    userShare,
                    partnerShare,
                    timestamp: Date.now(),
                    photos: photos.length > 0 ? photos : null
                };

                // Chiffrement si activé
                console.log('État chiffrement:', {
                    isEncryptionEnabled,
                    hasMasterPassword: !!masterPassword,
                    hasUserSalt: !!userSalt
                });

                if (isEncryptionEnabled && masterPassword && userSalt) {
                    console.log('⚠️ CHIFFREMENT de la transaction...');
                    newTransaction = await cryptoManager.encryptTransaction(newTransaction, masterPassword, userSalt);
                    console.log('✅ Transaction chiffrée:', newTransaction);
                } else {
                    console.log('❌ Pas de chiffrement - Transaction envoyée en clair');
                }

                if (editingTransaction) {
                    // Mode modification
                    database.ref(`sessions/${sessionCode}/transactions/${editingTransaction}`).set(newTransaction);
                    setEditingTransaction(null);
                } else {
                    // Mode ajout
                    database.ref(`sessions/${sessionCode}/transactions`).push(newTransaction);
                }

                // Reset
                setAmount('');
                setVendor('');
                setCategory('groceries');
                setIsShared(true);
                setSelectedImages([]);
                setCustomAmounts(false);
                setUserCustomAmount('');
                setPartnerCustomAmount('');
            }

            function deleteTransaction(id) {
                if (confirm('⚠️ Supprimer cette transaction? Elle sera déplacée dans l\'historique des suppressions.')) {
                    const transaction = transactions.find(t => t.id === id);
                    if (transaction) {
                        const deleted = {
                            ...transaction,
                            deletedAt: new Date().toISOString()
                        };
                        
                        const newDeleted = [...deletedTransactions, deleted];
                        setDeletedTransactions(newDeleted);
                        localStorage.setItem('budgetduo_deleted_transactions', JSON.stringify(newDeleted));
                    }
                    
                    database.ref(`sessions/${sessionCode}/transactions/${id}`).remove();
                }
            }

            function restoreTransaction(index) {
                const transaction = deletedTransactions[index];
                if (!transaction) return;

                const { id, deletedAt, ...transactionData } = transaction;
                
                database.ref(`sessions/${sessionCode}/transactions`).push(transactionData);
                
                const newDeleted = deletedTransactions.filter((_, i) => i !== index);
                setDeletedTransactions(newDeleted);
                localStorage.setItem('budgetduo_deleted_transactions', JSON.stringify(newDeleted));
            }

            // Catégories
            function addCategory() {
                if (!newCategoryName.trim()) return;

                const categoryId = newCategoryName.toLowerCase().replace(/\s+/g, '_');
                const newCategory = {
                    [categoryId]: {
                        icon: newCategoryIcon,
                        name: newCategoryName
                    }
                };

                database.ref(`sessions/${sessionCode}/categories`).update(newCategory);
                setNewCategoryName('');
                setNewCategoryIcon('📦');
                setShowIconPicker(false);
            }

            function deleteCategory(categoryId) {
                if (confirm('Supprimer cette catégorie?')) {
                    database.ref(`sessions/${sessionCode}/categories/${categoryId}`).remove();
                }
            }

            // Export CSV
            function exportToCSV() {
                const headers = ['Date', 'Type', 'Vendeur', 'Catégorie', 'Montant', 'Payeur', 'Bénéficiaire', 'Partagé'];
                const rows = transactions.map(t => [
                    t.date,
                    t.type === 'expense' ? 'Dépense' : t.type === 'income' ? 'Revenu' : 'Transfert',
                    t.vendor,
                    categories[t.category]?.name || t.category,
                    t.amount,
                    t.payer,
                    t.beneficiary,
                    t.isShared ? 'Oui' : 'Non'
                ]);

                const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `budgetduo-${sessionCode}-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            }

            // Reset
            function resetApp() {
                if (confirm('⚠️ Cette action supprimera toutes vos données. Continuer?')) {
                    localStorage.removeItem('budgetduo_session');
                    localStorage.removeItem('budgetduo_encryption_config');
                    window.location.reload();
                }
            }

            // Navigation mois
            function previousMonth() {
                const newMonth = new Date(currentMonth);
                newMonth.setMonth(newMonth.getMonth() - 1);
                setCurrentMonth(newMonth);
            }

            function nextMonth() {
                const newMonth = new Date(currentMonth);
                newMonth.setMonth(newMonth.getMonth() + 1);
                setCurrentMonth(newMonth);
            }

            function currentMonthButton() {
                setCurrentMonth(new Date());
            }

            // Calculs
            const monthTransactions = transactions.filter(t => {
                const transDate = new Date(t.date);
                return transDate.getMonth() === currentMonth.getMonth() &&
                       transDate.getFullYear() === currentMonth.getFullYear();
            });

            // Tri des transactions
            const sortedTransactions = [...monthTransactions].sort((a, b) => {
                let compareValue = 0;
                
                switch(sortBy) {
                    case 'date':
                        compareValue = new Date(a.date) - new Date(b.date);
                        break;
                    case 'amount':
                        compareValue = (a.amount || 0) - (b.amount || 0);
                        break;
                    case 'vendor':
                        compareValue = (a.vendor || '').localeCompare(b.vendor || '');
                        break;
                    case 'type':
                        compareValue = (a.type || '').localeCompare(b.type || '');
                        break;
                    default:
                        compareValue = 0;
                }

                return sortOrder === 'asc' ? compareValue : -compareValue;
            });

            // Calcul de la balance
            // Balance positive = userName doit de l'argent à partnerName
            // Balance négative = partnerName doit de l'argent à userName
            const userBalance = monthTransactions.reduce((balance, t) => {
                if (t.type === 'expense') {
                    const userShouldPay = t.userShare || 0;
                    const partnerShouldPay = t.partnerShare || 0;
                    
                    if (t.payer === userName) {
                        // userName a payé pour les deux - partnerName doit sa part
                        return balance - partnerShouldPay;
                    } else {
                        // partnerName a payé pour les deux - userName doit sa part
                        return balance + userShouldPay;
                    }
                } else if (t.type === 'income') {
                    const userShouldGet = t.userShare || 0;
                    const partnerShouldGet = t.partnerShare || 0;
                    
                    if (t.payer === userName) {
                        return balance + partnerShouldGet;
                    } else {
                        return balance - userShouldGet;
                    }
                } else if (t.type === 'transfer') {
                    if (t.payer === userName) {
                        // userName a transféré - doit maintenant moins
                        return balance - t.amount;
                    } else {
                        // partnerName a transféré - userName doit maintenant plus
                        return balance + t.amount;
                    }
                }
                return balance;
            }, 0);

            const totalExpenses = monthTransactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + (t.amount || 0), 0);

            const totalIncome = monthTransactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + (t.amount || 0), 0);

            if (cryptoSetupMode === 'unlock') {

                            <div style={{marginTop: '16px'}}>
                                <button

                                    onClick={() => {

                                            localStorage.removeItem('budgetduo_session');
                                            localStorage.removeItem('budgetduo_encryption_config');
                                            localStorage.removeItem('budgetduo_deleted_transactions');
                                            window.location.reload();
                                        }
                                    }}
                                >
                                    🗑️ Réinitialiser tout
                                </button>
                            </div>
                        </form>
                    </div>
                );
            }

            // Configuration
            if (!isSetup) {
                return (
                    <div className="app-container">
                        <form className="setup-container" onSubmit={handleSetup}>
                            <h1 className="setup-title">💰 BudgetDuo</h1>
                            <p className="setup-subtitle">Gérez vos dépenses partagées en toute simplicité</p>

                            <div className="input-group">
                                <label>Code de session</label>
                                <input
                                    type="text"

                            <div className="input-group">

                                <input

                    {currentMonth.getMonth() !== new Date().getMonth() && (

                    <div className="balance-section">

                            📋 Liste ({monthTransactions.length})

                    {activeTab === 'add' && (

                                        <span className="type-icon">💸</span>

                                    <button

                                        <span className="type-icon">💰</span>

                                    <button

                                {transactionType !== 'transfer' && (

                                        </div>

                                        <div className="input-group">
                                            <label>Catégorie</label>
                                            <select value={category} onChange={(e) => setCategory(e.target.value)}>
                                                {Object.entries(categories).map(([id, cat]) => (

                                        />
                                    </div>

                                <div className="input-group">
                                    <label>Montant ({currencySymbol})</label>
                                    <div style={{display: 'flex', gap: '8px', alignItems: 'flex-end'}}>
                                        <input
